<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Scraper Dufrio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:,">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #050505; --card-bg: rgba(18,18,28,0.85); --card-border: rgba(255,255,255,0.08); --green: #00e676; --blue: #007bff; --text: #ffffff; --muted: #7a7a9a; --radius: 16px; }
    body { font-family: "Outfit", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    .aurora { position: fixed; border-radius: 50%; filter: blur(130px); z-index: 0; pointer-events: none; opacity: 0.22; animation: auroraAnim 18s infinite alternate ease-in-out; }
    .a1 { width: 700px; height: 700px; background: #0056b3; top: -15%; left: -15%; }
    .a2 { width: 600px; height: 600px; background: #002752; bottom: -15%; right: -10%; animation-duration: 24s; }
    @keyframes auroraAnim { 0% { transform: scale(1) translate(0,0); } 100% { transform: scale(1.4) translate(60px,-60px); } }

    .btn-back { position: fixed; top: 16px; left: 16px; z-index: 999; background: rgba(255,255,255,0.06); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.12); color: #fff; padding: 6px 14px; border-radius: 30px; text-decoration: none; font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 5px; transition: 0.2s; }
    .btn-back:hover { background: rgba(255,255,255,0.12); transform: translateY(-1px); }
    .btn-back svg { width: 12px; height: 12px; stroke: currentColor; stroke-width: 2.5; fill: none; }

    .container { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 70px 24px 100px; text-align: center; }
    .page-header { margin-bottom: 48px; }
    .page-header h1 { font-size: 34px; font-weight: 900; letter-spacing: -1.5px; text-transform: uppercase; font-style: italic; background: linear-gradient(135deg, #007bff, #00d2ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
    .page-header p { font-size: 10px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid var(--card-border); padding-bottom: 28px; }

    .step-section { display: none; flex-direction: column; align-items: center; gap: 20px; animation: slideUp 0.5s cubic-bezier(0.22,1,0.36,1) forwards; margin-top: 8px; }
    .step-section.active { display: flex; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    h2 { font-size: 16px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 12px; margin-top: 20px; }

    .options-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 14px; width: 100%; }
    .option-btn { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid var(--card-border); padding: 14px 28px; border-radius: 12px; cursor: pointer; transition: opacity 0.3s, transform 0.25s, max-width 0.35s cubic-bezier(0.4,0,0.2,1), max-height 0.35s, padding 0.3s, margin 0.3s, border-width 0.3s, flex-basis 0.3s, flex-grow 0.3s, background 0.2s, border-color 0.2s, box-shadow 0.2s, color 0.2s; color: var(--text); font-weight: 800; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; font-family: "Outfit", sans-serif; }
    .option-btn:hover { border-color: rgba(0,123,255,0.35); background: rgba(0,123,255,0.08); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,123,255,0.1); }
    .option-btn:active { transform: scale(0.96); }
    .tipo-btn { display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 24px 20px; width: 190px; }
    .tipo-btn img { width: 150px; transition: transform 0.3s; filter: drop-shadow(0 0 14px rgba(0,123,255,0.35)); mix-blend-mode: screen; }
    .tipo-btn:hover img { transform: scale(1.06); filter: drop-shadow(0 0 20px rgba(0,123,255,0.6)); }

    .option-btn.selected { background: rgba(0,123,255,0.15); border-color: rgba(0,123,255,0.6); box-shadow: 0 0 20px rgba(0,123,255,0.25); color: #fff; }
    .tipo-btn.selected img { transform: scale(1.06); filter: drop-shadow(0 0 25px rgba(0,123,255,0.7)); }

    /* Locked state: only selected stays visible, others fade and collapse */
    .options-grid.locked { gap: 0; justify-content: center; }
    .options-grid.locked .option-btn:not(.selected) { opacity: 0; transform: translateY(-10px) scale(0.85); max-width: 0 !important; max-height: 0 !important; flex: 0 0 0 !important; margin: 0 !important; padding: 0 !important; border-width: 0 !important; pointer-events: none; overflow: hidden; }
    .options-grid.locked .option-btn.selected { cursor: pointer; margin-inline: auto; }
    #tipo-options.locked,
    #btu-options.locked,
    #ciclo-options.locked { gap: 0; justify-content: center; }
    #tipo-options.locked { display: flex; grid-template-columns: none; }
    #tipo-options.locked .tipo-btn.selected { flex: 0 0 auto; width: min(190px, 100%); }
    #btu-options.locked .option-btn.selected,
    #ciclo-options.locked .option-btn.selected { flex: 0 0 auto; min-width: 120px; }

    /* Confirmation bounce when an option is picked */
    @keyframes confirm-bounce { 0% { transform: scale(1); } 35% { transform: scale(1.08); } 70% { transform: scale(0.97); } 100% { transform: scale(1); } }
    .option-btn.bounce { animation: confirm-bounce 0.45s ease-out; }

    #loading-results { display: none; flex-direction: column; align-items: center; gap: 14px; padding: 50px; margin-top: 20px; }
    .spinner { width: 36px; height: 36px; border: 3px solid rgba(0,123,255,0.15); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-msg { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: var(--blue); }
    @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    .loading-sheet { color: var(--blue); font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; animation: pulse 1.5s infinite; text-align: center; width: 100%; padding: 40px 0; }

    /* GRID DE PRODUTOS */
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 22px; margin-top: 28px; width: 100%; }

    /* CARD */
    .product-card { background: linear-gradient(180deg, rgba(18,18,28,0.95), rgba(12,12,20,0.98)); border: 1px solid var(--card-border); border-radius: var(--radius); overflow: hidden; backdrop-filter: blur(16px); display: flex; flex-direction: column; transition: all 0.25s; position: relative; box-shadow: 0 14px 36px rgba(0,0,0,0.28); }
    .product-card:hover { border-color: rgba(0,123,255,0.3); transform: translateY(-3px); box-shadow: 0 16px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(0,123,255,0.1); }

    /* LOJA BADGE */
    .store-badge { position: absolute; top: 12px; left: 12px; z-index: 3; background: rgba(18,18,28,0.9); border: 1px solid rgba(255,255,255,0.1); padding: 3px 10px; border-radius: 20px; font-size: 9px; font-weight: 900; color: white; letter-spacing: 1.5px; text-transform: uppercase; backdrop-filter: blur(8px); }
    .store-badge.store-dufrio { background: linear-gradient(135deg, #004a99, #007bff); border-color: #007bff; }

    /* FOTO */
    .product-img-wrap { width: 100%; aspect-ratio: 1.08/1; background: #ffffff; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; border-bottom: 1px solid rgba(255,255,255,0.12); }
    .product-img-wrap img { width: 90%; height: 90%; object-fit: contain; transition: transform 0.3s; }
    .product-img-wrap:hover img { transform: scale(1.045); }
    .img-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.55); display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.2s; }
    .img-overlay span { font-size: 10px; font-weight: 900; letter-spacing: 2px; color: white; text-transform: uppercase; background: rgba(0,123,255,0.3); border: 1px solid rgba(0,123,255,0.5); padding: 8px 16px; border-radius: 8px; }
    .product-img-wrap:hover .img-overlay { opacity: 1; }
    .img-overlay.copied span { background: rgba(0,230,118,0.3); border-color: rgba(0,230,118,0.5); color: var(--green); }

    /* INFO AREA */
    .product-info { padding: 20px 14px 10px; cursor: pointer; position: relative; flex: 1; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 178px; }
    .product-info:hover { background: rgba(255,255,255,0.02); }
    .copy-hint { position: absolute; top: 10px; right: 10px; font-size: 8px; font-weight: 900; color: rgba(0,123,255,0.6); letter-spacing: 1px; text-transform: uppercase; opacity: 0; transition: 0.2s; z-index: 5; }
    .product-info:hover .copy-hint { opacity: 1; }
    .product-info.copied .copy-hint { opacity: 1; color: var(--green); content: "COPIADO!"; }

    .product-title { font-size: 15px; font-weight: 850; color: #ffffff; line-height: 1.32; margin-bottom: 16px; text-align: center; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; width: 100%; min-height: 79px; overflow: hidden; overflow-wrap: break-word; word-break: break-word; }
    .prices-wrap { display: flex; flex-direction: column; gap: 6px; align-items: center; width: 100%; text-align: center; background: rgba(3,3,10,0.62); padding: 14px 10px; border-radius: 13px; border: 1px solid rgba(255,255,255,0.06); box-shadow: inset 0 1px 0 rgba(255,255,255,0.03); margin-top: auto; }
    
    .price-vista { font-size: 21px; font-weight: 900; color: #00e676; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; text-align: center; text-shadow: 0 0 14px rgba(0,230,118,0.2); letter-spacing: 0; }
    .discount-badge { font-size: 10px; font-weight: 800; color: #00e676; background: rgba(0,230,118,0.12); border: 1px solid rgba(0,230,118,0.3); padding: 3px 10px; border-radius: 20px; letter-spacing: 0.5px; white-space: nowrap; }
    
    .price-install { font-size: 12px; color: #b7b7c8; font-weight: 700; text-align: center; line-height: 1.35; }

    /* BOTAO LINK */
    .card-footer { margin-top: auto; padding: 8px 14px 12px; border-top: 1px solid rgba(255,255,255,0.04); background: rgba(255,255,255,0.015); }
    .btn-link { display: block; width: 100%; padding: 8px; border-radius: 9px; background: rgba(0,123,255,0.08); border: 1px solid rgba(0,123,255,0.22); color: #79bdff; font-size: 9px; font-weight: 900; letter-spacing: 1.7px; text-transform: uppercase; text-align: center; cursor: pointer; transition: all 0.2s; font-family: "Outfit", sans-serif; }
    .btn-link:hover { background: linear-gradient(135deg, rgba(0,123,255,0.25), rgba(0,210,255,0.25)); border-color: rgba(0,123,255,0.5); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,123,255,0.15); }

    @media (max-width: 768px) {
      .container { padding: 50px 16px 60px; }

      .btn-back { top: 12px; left: 12px; padding: 5px 10px; font-size: 8px; }
      .btn-back svg { width: 10px; height: 10px; }

      .page-header { margin-bottom: 30px; }
      .page-header h1 { font-size: 24px; letter-spacing: -1px; margin-bottom: 6px; }
      .page-header p { font-size: 9px; padding-bottom: 16px; }

      h2 { font-size: 13px; margin-top: 16px; margin-bottom: 10px; }

      .options-grid { gap: 10px; }
      .option-btn { padding: 10px 16px; font-size: 10px; }
      #tipo-options { flex-wrap: nowrap; max-width: 480px; margin: 0 auto; gap: 10px; }
      .tipo-btn { flex: 1 1 0; width: auto; min-width: 0; flex-direction: column; padding: 16px 8px; gap: 10px; min-height: 150px; justify-content: center; }
      .tipo-btn img { width: 88%; max-width: 96px; }
      .tipo-btn span { font-size: 11px; line-height: 1.2; text-align: center; }

      .products-grid { grid-template-columns: minmax(0, 1fr); gap: 18px; margin-top: 22px; }
      .product-card { border-radius: 16px; max-width: 640px; width: 100%; margin: 0 auto; }
      .product-img-wrap { aspect-ratio: 4/3; }
      .product-img-wrap img { width: 88%; height: 88%; }
      .product-info { padding: 22px 20px 12px; min-height: 178px; }
      .product-title { font-size: 18px; line-height: 1.22; margin-bottom: 18px; min-height: auto; -webkit-line-clamp: 3; }
      .prices-wrap { padding: 16px 14px; gap: 7px; border-radius: 14px; }
      .price-vista { font-size: 25px; }
      .discount-badge { font-size: 9px; padding: 3px 9px; }
      .price-install { font-size: 13px; }
      .card-footer { padding: 8px 18px 14px; }
      .btn-link { padding: 9px; font-size: 9px; letter-spacing: 1.8px; opacity: 0.82; }

      .store-badge { font-size: 8px; padding: 2px 8px; }

      #selection-summary { padding: 12px 16px; flex-direction: column; gap: 10px; }
      .summary-text { font-size: 11px; }
      .summary-text span { padding: 4px 10px; font-size: 10px; }
      .btn-reset { padding: 8px 16px; font-size: 10px; }

      #filters-section { padding: 16px; gap: 12px; }
      .filter-group h3 { font-size: 10px; margin-bottom: 8px; }
      .filter-row { gap: 6px; }
      .filter-btn { padding: 6px 12px; font-size: 9px; border-radius: 16px; }

      .sync-status { bottom: 16px; right: 16px; padding: 8px 14px; font-size: 9px; }
      .sync-dot { width: 6px; height: 6px; }
    }

    @media (max-width: 480px) {
      .container { padding: 40px 12px 50px; }

      .btn-back { top: 10px; left: 10px; padding: 4px 8px; font-size: 7px; }
      .btn-back svg { width: 9px; height: 9px; }

      .page-header { margin-bottom: 24px; }
      .page-header h1 { font-size: 18px; letter-spacing: 0px; margin-bottom: 4px; }
      .page-header p { font-size: 8px; padding-bottom: 12px; letter-spacing: 0.5px; }

      h2 { font-size: 11px; margin-top: 14px; margin-bottom: 8px; letter-spacing: 0px; }

      .options-grid { gap: 8px; }
      .option-btn { padding: 8px 12px; font-size: 9px; }
      #tipo-options { gap: 8px; }
      .tipo-btn { padding: 14px 6px; gap: 8px; min-height: 130px; }
      .tipo-btn img { width: 88%; max-width: 80px; }
      .tipo-btn span { font-size: 10px; }

      .products-grid { grid-template-columns: minmax(0, 1fr); gap: 16px; }
      .product-card { border-radius: 16px; }
      .product-info { padding: 20px 16px 12px; min-height: 168px; }
      .product-title { font-size: 16px; line-height: 1.25; margin-bottom: 14px; -webkit-line-clamp: 3; }
      .product-img-wrap { aspect-ratio: 4/3; }
      .product-img-wrap img { width: 88%; height: 88%; }
      .img-overlay span { font-size: 9px; padding: 6px 12px; }

      .prices-wrap { padding: 14px 12px; gap: 5px; border-radius: 12px; }
      .price-vista { font-size: 23px; gap: 3px; }
      .discount-badge { font-size: 8px; padding: 2px 7px; }
      .price-install { font-size: 12px; line-height: 1.35; }

      .card-footer { padding: 7px 14px 12px; }
      .btn-link { padding: 8px; font-size: 8px; border-radius: 8px; opacity: 0.76; }

      .store-badge { font-size: 7px; padding: 2px 6px; top: 8px; left: 8px; }
      .copy-hint { font-size: 7px; top: 6px; right: 6px; }

      #selection-summary { padding: 10px 12px; flex-direction: column; gap: 8px; margin-bottom: 16px; }
      .summary-text { font-size: 10px; }
      .summary-text span { padding: 3px 8px; font-size: 9px; }
      .btn-reset { padding: 6px 12px; font-size: 9px; }

      #filters-section { padding: 12px; gap: 10px; margin-bottom: 20px; }
      .filter-group h3 { font-size: 9px; margin-bottom: 6px; }
      .filter-row { gap: 5px; }
      .filter-btn { padding: 5px 10px; font-size: 8px; border-radius: 14px; }

      .sync-status { bottom: 12px; right: 12px; padding: 6px 10px; font-size: 8px; }
      .sync-dot { width: 5px; height: 5px; }

      #loading-results { padding: 30px; }
      .spinner { width: 28px; height: 28px; border-width: 2px; }
      #loading-msg { font-size: 10px; }
    }

    /* SUMMARY BAR */
    #selection-summary { width: 100%; background: var(--card-bg); border: 1px solid var(--card-border); padding: 16px 24px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; backdrop-filter: blur(12px); flex-wrap: wrap; gap: 14px; }
    .summary-text { font-size: 13px; font-weight: 800; color: #fff; text-transform: uppercase; letter-spacing: 1px; display: flex; gap: 12px; flex-wrap: wrap; }
    .summary-text span { background: rgba(0,123,255,0.15); padding: 6px 14px; border-radius: 8px; border: 1px solid rgba(0,123,255,0.3); color: var(--blue); }
    .btn-reset { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); padding: 10px 20px; border-radius: 8px; color: #fff; font-weight: 800; font-size: 12px; cursor: pointer; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px; font-family: "Outfit", sans-serif; }
    .btn-reset:hover { background: rgba(255,255,255,0.15); transform: translateY(-2px); border-color: rgba(255,255,255,0.3); }

    /* FILTERS */
    #filters-section { width: 100%; display: flex; flex-direction: column; gap: 20px; margin-bottom: 30px; background: rgba(18,18,28,0.5); padding: 24px; border-radius: 12px; border: 1px solid var(--card-border); }
    .filter-group h3 { font-size: 11px; font-weight: 900; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; text-align: left; }
    .filter-row { display: flex; flex-wrap: wrap; gap: 10px; }
    .filter-quality-row { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .filter-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: #a1a1aa; padding: 8px 16px; border-radius: 20px; font-size: 11px; font-weight: 800; cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 1px; font-family: "Outfit", sans-serif; }
    .filter-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .filter-btn.active { background: rgba(0,123,255,0.2); border-color: rgba(0,123,255,0.5); color: var(--blue); box-shadow: 0 0 10px rgba(0,123,255,0.2); }
    .filter-quality-btn { color: #e5e7eb; background: rgba(255,255,255,0.045); }
    .filter-quality-btn.quality-premium.active { background: rgba(176,141,87,0.22); border-color: rgba(176,141,87,0.65); color: #f6d795; box-shadow: 0 0 12px rgba(176,141,87,0.22); }
    .filter-quality-btn.quality-boa.active { background: rgba(0,176,80,0.2); border-color: rgba(0,176,80,0.6); color: #22c55e; box-shadow: 0 0 12px rgba(0,176,80,0.18); }
    .filter-quality-btn.quality-inter.active { background: rgba(255,192,0,0.18); border-color: rgba(255,192,0,0.58); color: #facc15; box-shadow: 0 0 12px rgba(255,192,0,0.18); }
    .filter-quality-btn.quality-basica.active { background: rgba(255,0,0,0.16); border-color: rgba(255,0,0,0.48); color: #f87171; box-shadow: 0 0 12px rgba(255,0,0,0.14); }

    /* SYNC STATUS */
    .sync-status { position: fixed; bottom: 20px; right: 20px; z-index: 1000; background: rgba(18,18,28,0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); padding: 10px 18px; border-radius: 30px; display: flex; align-items: center; gap: 10px; font-size: 10px; font-weight: 800; color: #fff; text-transform: uppercase; letter-spacing: 1.5px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); transition: all 0.4s ease; cursor: default; }
    .sync-dot { width: 8px; height: 8px; border-radius: 50%; }
    .sync-status.loading .sync-dot { background: #f59e0b; box-shadow: 0 0 10px #f59e0b; animation: pulse-dot 1s infinite alternate; }
    .sync-status.success .sync-dot { background: #00e676; box-shadow: 0 0 10px #00e676; }
    .sync-status.error .sync-dot { background: #ff5252; box-shadow: 0 0 10px #ff5252; }
    @keyframes pulse-dot { from { opacity: 0.4; transform: scale(0.8); } to { opacity: 1; transform: scale(1.2); } }

    /* Mobile polish: visual only, preserving scraper behavior and selectors. */
    html {
      background: var(--bg);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      width: 620px;
      height: 620px;
      border-radius: 50%;
      filter: blur(150px);
      z-index: 0;
      pointer-events: none;
      opacity: 0.13;
      background: #0056b3;
      top: 36%;
      left: 38%;
      animation: auroraAnim 25s infinite alternate ease-in-out;
    }

    .container,
    .step-section,
    .options-grid,
    #selection-summary,
    #filters-section,
    .products-grid,
    .product-card,
    .product-info,
    .prices-wrap,
    .filter-row {
      max-width: 100%;
      min-width: 0;
    }

    .page-header h1,
    .page-header p,
    h2,
    .summary-text,
    .summary-text span,
    .filter-btn,
    .product-title,
    .price-install,
    .btn-link,
    .loading-sheet,
    #loading-msg {
      overflow-wrap: anywhere;
    }

    button,
    .option-btn,
    .filter-btn,
    .btn-reset,
    .btn-link,
    .product-img-wrap,
    .product-info {
      touch-action: manipulation;
    }

    @media (max-width: 900px) {
      body {
        overflow-x: hidden;
      }

      .container {
        padding: 64px 18px 88px;
      }

      .page-header {
        margin-bottom: 36px;
      }

      .page-header h1 {
        font-size: 30px;
        line-height: 1.05;
        letter-spacing: 0;
      }

      .page-header p {
        max-width: 720px;
        margin: 0 auto;
        line-height: 1.55;
      }

      .options-grid {
        gap: 12px;
      }

  <script src="ultimo_log.js" onerror="window.LATEST_LOG = null;"></script>
  <script>
    const IMAGES = {"Hiwall":"img/hi_wall.png","Hi Wall":"img/hi_wall.png","Piso Teto":"img/piso_teto.png","Cassete":"img/cassete.png"};
    let sheetData = [], selection = {tipo:"",btu:"",ciclo:""};
    const CACHE_KEY = "scraper_sheet_data_v1";

    let allFetchedProducts = [];
    let activeFilters = { marcas: [], btus: [], ciclos: [] };
    const LISTA_MARCAS = ["Agratto", "Aiwa", "Aufit", "Britânia", "Carrier", "Comfee", "Consul", "Daikin", "Electrolux", "Elgin", "EOS", "Fujitsu", "Gree", "Hisense", "Hitachi", "HQ", "Komeco", "LG", "Midea", "Philco", "Samsung", "Springer Midea", "TCL", "Trane", "Vix", "York"];
    const QUALITY_BRANDS = {
      premium: { label: "Premium", brands: ["daikin", "fujitsu", "hitachi", "trane"] },
      boa: { label: "Boa", brands: ["lg", "samsung", "gree", "carrier", "midea", "hisense"] },
      inter: { label: "Intermediária", brands: ["springer", "springer midea", "elgin", "tcl", "agratto", "electrolux"] },
      basica: { label: "Básica", brands: [] }
    };
    
    const TIPOS_PADRAO = ["Hiwall", "Piso Teto", "Cassete"];
    const BTUS_PADRAO_POR_TIPO = {
      "Hiwall": ["9000", "12000", "18000", "22000 a 24000", "27000 a 34000", "36000"],
      "Piso Teto": ["24000 a 30000", "34000 a 36000", "42000 a 48000", "52000 a 60000", "70000 a 80000"],
      "Cassete": ["9000", "12000", "18000", "22000 a 24000", "28000 a 34000", "36000", "42000 a 52000", "55000 a 60000"]
    };
    const CICLOS_PADRAO = ["Só Frio", "Quente/Frio"];
    let sheetLoadPromise = null;

    async function loadData() {
      // 1. Renderiza o caminho completo imediatamente para o usuário não esperar a planilha.
      refreshChoiceOptions();
      
      const syncStatus = document.getElementById("sync-status");
      const syncText = document.getElementById("sync-text");

      // 2. Carrega a planilha em segundo plano
      sheetLoadPromise = (async () => {
        const cached = localStorage.getItem(CACHE_KEY);
        if (cached) {
          try { sheetData = JSON.parse(cached); } catch(e) {}
        }

        try {
          const r = await fetch("https://opensheet.elk.sh/1ml7XpwZfzM4ElRJb4G62b93VMqUw3jeprTtgxdigiD8/Sheet1");
          const freshData = await r.json();
          if (JSON.stringify(sheetData) !== JSON.stringify(freshData)) {
            sheetData = freshData;
            localStorage.setItem(CACHE_KEY, JSON.stringify(sheetData));
          }
          
          syncStatus.className = "sync-status success";
          syncText.innerText = "Conectado";
          
          setTimeout(() => {
            syncStatus.style.opacity = "0.5";
            syncStatus.style.transform = "scale(0.95)";
          }, 3000);
          
          syncStatus.onmouseenter = () => { syncStatus.style.opacity = "1"; syncStatus.style.transform = "scale(1)"; };
          syncStatus.onmouseleave = () => { syncStatus.style.opacity = "0.5"; syncStatus.style.transform = "scale(0.95)"; };
          reconcileSelectionsWithOptions();
          refreshChoiceOptions();
          
        } catch(e) {
          console.error("Erro ao carregar planilha", e);
          syncStatus.className = "sync-status error";
          syncText.innerText = "Falha ao Conectar";
        }
      })();
    }

    function uniqueValues(items) {
      return [...new Set(items.filter(Boolean))];
    }

    function sortBTUs(a, b) {
      const getVal = (s) => parseInt(String(s).replace(/[.,]/g, "").match(/\d+/) || [0], 10);
      return getVal(a) - getVal(b);
    }

    function normalizeCicloValue(c) {
      return String(c || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .trim()
        .replace(/^so\s+/, "");
    }

    function getFallbackBTUs(tipo = selection.tipo) {
      if (tipo && BTUS_PADRAO_POR_TIPO[tipo]) return BTUS_PADRAO_POR_TIPO[tipo];
      return uniqueValues(TIPOS_PADRAO.flatMap(t => BTUS_PADRAO_POR_TIPO[t] || [])).sort(sortBTUs);
    }

    function getTipoOptions() {
      const tipos = sheetData && sheetData.length > 0 ? uniqueValues(sheetData.map(i => i.Tipo)) : TIPOS_PADRAO;
      return TIPOS_PADRAO.filter(t => tipos.includes(t)).concat(tipos.filter(t => !TIPOS_PADRAO.includes(t)).sort());
    }

    function getBTUOptions(tipo = selection.tipo) {
      if (!sheetData || sheetData.length === 0) return getFallbackBTUs(tipo);
      const source = tipo ? sheetData.filter(i => i.Tipo === tipo) : sheetData;
      const btus = uniqueValues(source.map(i => i.BTUs)).sort(sortBTUs);
      return btus.length ? btus : getFallbackBTUs(tipo);
    }

    function getCicloOptions(tipo = selection.tipo, btu = selection.btu) {
      if (!sheetData || sheetData.length === 0 || !tipo || !btu) return CICLOS_PADRAO;
      const ciclos = uniqueValues(sheetData
        .filter(i => i.Tipo === tipo && i.BTUs === btu)
        .map(i => i.Ciclo)
      );
      return ciclos.length ? ciclos : CICLOS_PADRAO;
    }

    function reconcileSelectionsWithOptions() {
      const tipos = getTipoOptions();
      if (selection.tipo && !tipos.includes(selection.tipo)) {
        selection = {tipo:"",btu:"",ciclo:""};
        return;
      }

      const btus = getBTUOptions();
      if (selection.btu && !btus.includes(selection.btu)) {
        selection.btu = "";
        selection.ciclo = "";
        return;
      }

      const ciclos = getCicloOptions();
      if (selection.ciclo && !ciclos.some(ciclo => normalizeCicloValue(ciclo) === normalizeCicloValue(selection.ciclo))) {
        selection.ciclo = "";
      }
    }

    function refreshChoiceOptions() {
      const showBtus = !!selection.tipo;
      const showCiclo = !!selection.tipo && !!selection.btu;
      document.getElementById("step-btus").classList.toggle("active", showBtus);
      document.getElementById("step-ciclo").classList.toggle("active", showCiclo);
      renderTipos();
      if (showBtus) {
        renderOptions("btu-options", getBTUOptions(), selectBTU, selection.btu, formatBTU);
      } else {
        document.getElementById("btu-options").innerHTML = "";
      }
      if (showCiclo) {
        renderOptions("ciclo-options", getCicloOptions(), selectCiclo, selection.ciclo, formatCiclo);
      } else {
        document.getElementById("ciclo-options").innerHTML = "";
      }
    }

    function renderTipos() {
      const c = document.getElementById("tipo-options"); c.innerHTML = "";
      c.classList.toggle("locked", !!selection.tipo);
      const tipos = getTipoOptions();
      tipos.forEach(t => {
        const b = document.createElement("button");
        b.className = "option-btn tipo-btn" + (selection.tipo === t ? " selected" : "");
        b.dataset.value = t;

        let imgName = t;
        if (t === "Hiwall" || t === "Hi Wall") imgName = "Hi Wall";
        b.innerHTML = "<img src='"+(IMAGES[imgName]||"img/hi_wall.png")+"' onerror=\"this.src='https://placehold.co/80';\"><span>"+t+"</span>";

        b.onclick = () => selectTipo(t); c.appendChild(b);
      });
    }

    function bounceSelected(containerId) {
      const sel = document.querySelector("#" + containerId + " .option-btn.selected");
      if (sel) {
        sel.classList.remove("bounce");
        void sel.offsetWidth;
        sel.classList.add("bounce");
        setTimeout(() => sel.classList.remove("bounce"), 500);
      }
    }

    function formatBTU(btu) { 
      return String(btu).replace(/\b(\d+)\b/g, (match) => {
        if(match.length >= 4) return match.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        return match;
      }); 
    }
    function formatCiclo(ciclo) { return String(ciclo).toLowerCase().trim() === "frio" ? "Só Frio" : ciclo; }

    function lockGrid(containerId, matchValue, getValue) {
      const c = document.getElementById(containerId);
      const buttons = Array.from(c.querySelectorAll(".option-btn"));
      buttons.forEach(b => b.classList.toggle("selected", getValue(b) === matchValue));
      c.classList.add("locked");
    }

    function unlockGrid(containerId) {
      const c = document.getElementById(containerId);
      c.classList.remove("locked");
      Array.from(c.querySelectorAll(".option-btn")).forEach(b => b.classList.remove("selected"));
    }

    async function selectTipo(t) {
      if (selection.tipo === t) {
        selection.tipo = "";
        selection.btu = "";
        selection.ciclo = "";
        refreshChoiceOptions();
        document.getElementById("step-resultados").classList.remove("active");
        document.getElementById("loading-results").style.display = "none";
        return;
      }

      selection.tipo = t;
      reconcileSelectionsWithOptions();
      refreshChoiceOptions();
      bounceSelected("tipo-options");

      document.getElementById("step-resultados").classList.remove("active");
      document.getElementById("loading-results").style.display = "none";

      maybeStartScrapingFromSelection();

      setTimeout(() => document.getElementById("step-btus").scrollIntoView({behavior: 'smooth', block: 'center'}), 280);
    }

    function selectBTU(b) {
      if (selection.btu === b) {
        selection.btu = "";
        selection.ciclo = "";
        refreshChoiceOptions();
        document.getElementById("step-resultados").classList.remove("active");
        document.getElementById("loading-results").style.display = "none";
        return;
      }

      selection.btu = b;
      reconcileSelectionsWithOptions();
      refreshChoiceOptions();
      bounceSelected("btu-options");

      document.getElementById("step-resultados").classList.remove("active");
      document.getElementById("loading-results").style.display = "none";

      maybeStartScrapingFromSelection();

      setTimeout(() => document.getElementById("step-ciclo").scrollIntoView({behavior: 'smooth', block: 'center'}), 280);
    }

    function selectCiclo(c) {
      if (selection.ciclo === c) {
        selection.ciclo = "";
        refreshChoiceOptions();
        document.getElementById("step-resultados").classList.remove("active");
        document.getElementById("loading-results").style.display = "none";
        document.getElementById("results-grid").innerHTML = "";
        document.getElementById("filters-section").style.display = "none";
        return;
      }

      selection.ciclo = c;
      refreshChoiceOptions();
      bounceSelected("ciclo-options");

      maybeStartScrapingFromSelection();
    }

    function maybeStartScrapingFromSelection() {
      if (!selection.tipo || !selection.btu || !selection.ciclo) return;

      document.getElementById("loading-results").style.display = "flex";
      document.getElementById("step-resultados").classList.add("active");
      document.getElementById("results-grid").innerHTML = "";

      setTimeout(() => document.getElementById("step-resultados").scrollIntoView({behavior: 'smooth', block: 'start'}), 100);

      startScraping();
    }

    function renderOptions(id, opts, cb, currentSelection, formatter) {
      const c = document.getElementById(id); c.innerHTML="";
      c.classList.toggle("locked", !!currentSelection);
      opts.forEach(o => {
        const b = document.createElement("button");
        b.className = "option-btn" + (currentSelection === o ? " selected" : "");
        b.dataset.value = o;
        b.innerText = formatter ? formatter(o) : o;
        b.onclick = () => cb(o);
        c.appendChild(b);
      });
    }

    // Formato de cópia
    const HYPER_BRANDS = [...QUALITY_BRANDS.premium.brands, ...QUALITY_BRANDS.boa.brands];
    function boldBrand(title) {
      for (const b of HYPER_BRANDS) {
        const rx = b==="lg" ? new RegExp("\\b("+b+")\\b","i") : new RegExp("("+b+")","i");
        if (rx.test(title)) return title.replace(rx,"*$1*");
      }
      return title;
    }
    function getCycleEmoji(title) {
      const t = title.toLowerCase();
      if (t.includes("quente/frio")||t.includes("quente e frio")||t.includes("quente frio")||t.includes("q/f")) return "🔥❄️";
      return "❄️";
    }
    function formatCopyText(title,spot,install) {
      return getCycleEmoji(title)+" "+boldBrand(title)+"\n💰 "+spot+"\n💳 "+install;
    }

    // Scraper Dufrio
    async function scrapeDufrio(url) {
      const PROXY_WORKER = "https://frigelar-proxy.crftwo.workers.dev/?url=";
      try {
        let freshUrl = url;
        try {
          const u = new URL(url);
          u.searchParams.set('_', Date.now());
          freshUrl = u.toString();
        } catch(_) { freshUrl = url + (url.includes('?') ? '&' : '?') + '_=' + Date.now(); }

        const resp = await fetch(PROXY_WORKER + encodeURIComponent(freshUrl), { cache: 'no-store' });
        const html = await resp.text();
        const doc = new DOMParser().parseFromString(html, "text/html");
        
        const cards = Array.from(doc.querySelectorAll('.product-item'));
        return cards.map(card => {
          const titleEl = card.querySelector('a.product-item-link');
          if (!titleEl) return null;
          const title = titleEl.innerText.trim();
          
          const imgEl = card.querySelector('img.product-image-photo, img.product-image');
          let image = "";
          if (imgEl) {
             image = imgEl.src || imgEl.getAttribute('data-src') || "";
             // Se a URL da imagem vier relativa do proxy, ajusta
             if (image.includes('workers.dev')) {
                const u = new URL(image);
                image = u.searchParams.get('url') || image;
             }
             if (image && !image.startsWith('http')) image = "https://www.dufrio.com.br" + (image.startsWith('/') ? '' : '/') + image;
          }

          // Preço à vista (PIX)
          let spotLine = "";
          const spotPriceEl = card.querySelector('.spot-price');
          if (spotPriceEl) {
            spotLine = spotPriceEl.innerText.replace(/\s+/g, ' ').trim();
          } else {
            const cashDownEl = card.querySelector('#cash_down');
            if (cashDownEl) spotLine = cashDownEl.innerText.replace(/\s+/g, ' ').trim();
          }

          // Preço parcelado
          let installLine = "";
          const ps = card.querySelectorAll('p');
          ps.forEach(p => {
            const pText = p.innerText.toLowerCase();
            if (pText.includes('ou r$') && (pText.includes('em') || pText.includes('x'))) {
              installLine = p.innerText.replace(/\s+/g, ' ').trim();
            }
          });

          let link = titleEl.getAttribute('href') || "";
          if (link && !link.startsWith('http')) link = "https://www.dufrio.com.br" + (link.startsWith('/') ? '' : '/') + link;

          if (!spotLine || !installLine) return null;
          return { title, image, spot: spotLine, install: installLine, link, discount: 0 };
        }).filter(Boolean);
      } catch(e) { console.error("Dufrio erro:", e); return []; }
    }

    async function startScraping() {
      try {
        document.getElementById("selection-summary").style.display = "none";
        document.getElementById("filters-section").style.display = "none";

        allFetchedProducts = [];
        activeFilters = { marcas: [], btus: [], ciclos: [] };

        if (sheetLoadPromise) {
          document.getElementById("loading-msg").innerText = "SINCRONIZANDO PLANILHA...";
          await sheetLoadPromise;
        }

        const normalizeCiclo = (c) => {
          return String(c || "").toLowerCase().trim().replace(/^só\s+/, "");
        };
        const cicloNormalizado = normalizeCiclo(selection.ciclo);

        const links = sheetData.filter(i => {
          const cicloSheet = normalizeCiclo(i.Ciclo);
          return i.Tipo === selection.tipo &&
                 i.BTUs === selection.btu &&
                 cicloSheet === cicloNormalizado;
        });

        // Matching frouxo
        const norm = (s) => String(s || '')
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .toLowerCase()
          .replace(/[\s\-_.]/g, '');
        const dufrioLink = links.find(l => l.Site && norm(l.Site).includes("dufrio"));

        document.getElementById("loading-msg").innerText = "CONSULTANDO DUFRIO...";

        const scrapePromises = [];

        if (dufrioLink && dufrioLink.Link) {
          scrapePromises.push(
            scrapeDufrio(dufrioLink.Link).then(products => {
              return products.map(p => ({...p, storeName: "Dufrio"}));
            })
          );
        }

        const resultsArrays = await Promise.all(scrapePromises);
        
        resultsArrays.forEach(products => {
            products.forEach(p => {
                allFetchedProducts.push(extractProductInfo(p));
            });
        });
        
        // Ordenar todos os produtos pelo preço à vista
        allFetchedProducts.sort((a, b) => {
            const getPrice = (str) => parseFloat(str.replace(/[^\d,]/g, '').replace(',', '.')) || 0;
            return getPrice(a.spot) - getPrice(b.spot);
        });
        
        document.getElementById("loading-results").style.display = "none";
        
        const summaryTextEl = document.getElementById("summary-text");
        summaryTextEl.innerHTML = `<span>Dufrio</span><span>${selection.tipo}</span><span>${formatBTU(selection.btu)} BTUs</span><span>${formatCiclo(selection.ciclo)}</span>`;
        document.getElementById("selection-summary").style.display = "flex";

        if (allFetchedProducts.length > 0) {
          generateFilters();
          applyFilters();
        } else {
          document.getElementById("results-grid").innerHTML="<p style=\"grid-column:1/-1;color:var(--muted);font-size:13px;text-transform:uppercase;font-weight:800;text-align:center;padding:40px 0;\">Nenhum produto encontrado na Dufrio para esta combinação.</p>";
        }
      } catch (err) {
        console.error("Erro no scraping:", err);
        document.getElementById("loading-results").style.display = "none";
        document.getElementById("results-grid").innerHTML="<p style=\"grid-column:1/-1;color:#ff5252;font-size:13px;text-transform:uppercase;font-weight:800;text-align:center;padding:40px 0;\">Erro ao processar dados da Dufrio. Verifique a planilha.</p>";
      }
    }

    function extractProductInfo(p) {
      let marca = "Outras";
      for (const m of LISTA_MARCAS) {
        if (p.title.toLowerCase().includes(m.toLowerCase())) {
          marca = m; break;
        }
      }
      let btu = "";
      const titleClean = p.title.replace(/\./g, "");
      const btuMatch = titleClean.match(/\b(\d{4,5})\s*BTU/i) || titleClean.match(/\b(\d{4,5})\b/);
      if (btuMatch) {
        let bNum = btuMatch[1];
        btu = bNum.replace(/\B(?=(\d{3})+(?!\d))/g, ".") + " BTUs";
      } else if (selection && selection.btu) {
        btu = selection.btu.replace(/\B(?=(\d{3})+(?!\d))/g, ".") + " BTUs";
      } else {
        btu = "Outros";
      }
      
      let ciclo = "Só Frio";
      if (p.title.toLowerCase().includes("quente")) ciclo = "Quente/Frio";
      p.marca = marca; p.btu = btu; p.ciclo = ciclo;
      return p;
    }

    function generateFilters() {
      const marcas = [...new Set(allFetchedProducts.map(p=>p.marca))].sort();
      const btus = [...new Set(allFetchedProducts.map(p=>p.btu))].sort((a,b)=>parseInt(a)-parseInt(b));
      const ciclos = [...new Set(allFetchedProducts.map(p=>p.ciclo))].sort();
      renderFilterRow("filter-marcas", marcas, "marcas");
      renderBrandQualityFilters(marcas);
      renderFilterRow("filter-btus", btus, "btus");
      renderFilterRow("filter-ciclos", ciclos, "ciclos");
      document.getElementById("filters-section").style.display = (allFetchedProducts.length > 0) ? "flex" : "none";
    }

    function normalizeBrand(value) {
      return String(value || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
    }

    function getBrandQualityMatches(availableBrands) {
      const normalizedToOriginal = new Map();
      availableBrands.forEach(brand => normalizedToOriginal.set(normalizeBrand(brand), brand));

      const assigned = new Set();
      const groups = [];
      ["premium", "boa", "inter"].forEach(key => {
        const config = QUALITY_BRANDS[key];
        const matches = [];
        config.brands.forEach(brandKey => {
          const normalized = normalizeBrand(brandKey);
          if (normalizedToOriginal.has(normalized)) {
            matches.push(normalizedToOriginal.get(normalized));
            assigned.add(normalized);
          }
        });
        if (matches.length) groups.push({ key, label: config.label, brands: matches });
      });

      const basicBrands = availableBrands.filter(brand => !assigned.has(normalizeBrand(brand)));
      if (basicBrands.length) {
        groups.push({ key: "basica", label: QUALITY_BRANDS.basica.label, brands: basicBrands });
      }
      return groups;
    }

    function renderBrandQualityFilters(availableBrands) {
      const c = document.getElementById("filter-marca-grupos");
      if (!c) return;
      c.innerHTML = "";

      const groups = getBrandQualityMatches(availableBrands);
      c.style.display = groups.length ? "flex" : "none";

      groups.forEach(group => {
        const btn = document.createElement("button");
        btn.className = `filter-btn filter-quality-btn quality-${group.key}`;
        btn.dataset.brands = group.brands.join("|");
        btn.innerText = `${group.label} (${group.brands.length})`;
        btn.title = group.brands.join(", ");
        btn.onclick = () => toggleBrandQualityGroup(group.brands);
        c.appendChild(btn);
      });
      syncBrandFilterVisuals();
    }

    function toggleBrandQualityGroup(brands) {
      const alreadyOnlyThisGroup = activeFilters.marcas.length === brands.length && brands.every(brand => activeFilters.marcas.includes(brand));
      activeFilters.marcas = alreadyOnlyThisGroup ? [] : [...brands];
      syncBrandFilterVisuals();
      applyFilters();
    }

    function syncBrandFilterVisuals() {
      document.querySelectorAll("#filter-marcas .filter-btn").forEach(btn => {
        btn.classList.toggle("active", activeFilters.marcas.includes(btn.dataset.value));
      });

      document.querySelectorAll("#filter-marca-grupos .filter-quality-btn").forEach(btn => {
        const brands = (btn.dataset.brands || "").split("|").filter(Boolean);
        const active = brands.length > 0 && activeFilters.marcas.length === brands.length && brands.every(brand => activeFilters.marcas.includes(brand));
        btn.classList.toggle("active", active);
      });
    }

    function renderFilterRow(id, items, type) {
      const c = document.getElementById(id); c.innerHTML = "";
      if (items.length <= 1 && type !== "marcas") {
          c.parentElement.style.display = "none";
          return;
      }
      c.parentElement.style.display = "block";
      items.forEach(item => {
        const btn = document.createElement("button");
        btn.className = "filter-btn"; 
        btn.dataset.value = item;
        btn.innerText = item;
        if (activeFilters[type].includes(item)) btn.classList.add("active");
        btn.onclick = () => toggleFilter(btn, type, item);
        c.appendChild(btn);
      });
    }

    function toggleFilter(btn, type, value) {
      const idx = activeFilters[type].indexOf(value);
      if (idx > -1) { activeFilters[type].splice(idx, 1); btn.classList.remove("active"); }
      else { activeFilters[type].push(value); btn.classList.add("active"); }
      if (type === "marcas") syncBrandFilterVisuals();
      applyFilters();
    }

    function applyFilters() {
      const grid = document.getElementById("results-grid"); grid.innerHTML = "";
      const filtered = allFetchedProducts.filter(p => {
        const m = activeFilters.marcas.length === 0 || activeFilters.marcas.includes(p.marca);
        const b = activeFilters.btus.length === 0 || activeFilters.btus.includes(p.btu);
        const c = activeFilters.ciclos.length === 0 || activeFilters.ciclos.includes(p.ciclo);
        return m && b && c;
      });
      if (filtered.length === 0) grid.innerHTML = "<p style=\"grid-column:1/-1;color:var(--muted);font-size:13px;text-transform:uppercase;font-weight:800;text-align:center;padding:40px 0;\">Nenhum produto atende aos filtros atuais.</p>";
      else filtered.forEach(p => grid.appendChild(createCard(p, "Dufrio")));
    }

    function resetScraper() {
      selection = {tipo:"",btu:"",ciclo:""};
      allFetchedProducts = [];
      activeFilters = { marcas: [], btus: [], ciclos: [] };
      document.getElementById("results-grid").innerHTML = "";
      document.getElementById("filters-section").style.display = "none";
      document.getElementById("selection-summary").style.display = "none";
      document.getElementById("step-btus").classList.remove("active");
      document.getElementById("step-ciclo").classList.remove("active");
      document.getElementById("step-resultados").classList.remove("active");
      document.getElementById("loading-results").style.display = "none";
      renderTipos();
      document.getElementById("step-tipo").scrollIntoView({behavior: 'smooth', block: 'start'});
    }

    function normalizeCopyImageUrl(url) {
      let cleanUrl = String(url || "").trim();
      if (!cleanUrl) throw new Error("Imagem ausente");

      if (cleanUrl.includes("workers.dev") && cleanUrl.includes("url=")) {
        try {
          cleanUrl = new URL(cleanUrl).searchParams.get("url") || cleanUrl;
        } catch (_) {}
      }

      if (cleanUrl.startsWith("//")) cleanUrl = "https:" + cleanUrl;
      return cleanUrl;
    }

    function imageProxyUrls(url, storeName) {
      const cleanUrl = normalizeCopyImageUrl(url);
      const store = String(storeName || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
      const proxied = [
        "https://wsrv.nl/?url=" + encodeURIComponent(cleanUrl),
        "https://images.weserv.nl/?url=" + encodeURIComponent(cleanUrl),
        "https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(cleanUrl)
      ];
      const urls = (store === "frigelar" || store === "central ar" || store === "friopecas" || store === "webcontinental" || store === "climario")
        ? [...proxied, cleanUrl]
        : [cleanUrl, ...proxied];
      return [...new Set(urls)];
    }

    function detectImageMime(buffer, contentType, sourceUrl) {
      const bytes = new Uint8Array(buffer.slice(0, 12));
      if (bytes[0] === 0xff && bytes[1] === 0xd8 && bytes[2] === 0xff) return "image/jpeg";
      if (bytes[0] === 0x89 && bytes[1] === 0x50 && bytes[2] === 0x4e && bytes[3] === 0x47) return "image/png";
      if (bytes[0] === 0x47 && bytes[1] === 0x49 && bytes[2] === 0x46) return "image/gif";
      if (bytes[0] === 0x52 && bytes[1] === 0x49 && bytes[2] === 0x46 && bytes[8] === 0x57 && bytes[9] === 0x45) return "image/webp";

      const headerType = String(contentType || "").split(";")[0].trim().toLowerCase();
      if (headerType.startsWith("image/")) return headerType;

      const lowerUrl = String(sourceUrl || "").toLowerCase();
      if (lowerUrl.includes(".png")) return "image/png";
      if (lowerUrl.includes(".webp")) return "image/webp";
      return "image/jpeg";
    }

    async function decodeImageBlob(blob) {
      if (typeof createImageBitmap === "function") {
        try {
          return await createImageBitmap(blob);
        } catch (_) {}
      }

      return await new Promise((resolve, reject) => {
        const objectUrl = URL.createObjectURL(blob);
        const image = new Image();
        image.onload = () => {
          URL.revokeObjectURL(objectUrl);
          resolve(image);
        };
        image.onerror = () => {
          URL.revokeObjectURL(objectUrl);
          reject(new Error("Falha ao decodificar imagem"));
        };
        image.src = objectUrl;
      });
    }

    async function convertImageToPng(blob) {
      const decoded = await decodeImageBlob(blob);
      const width = decoded.width || decoded.naturalWidth;
      const height = decoded.height || decoded.naturalHeight;
      if (!width || !height) throw new Error("Imagem sem dimensoes");

      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#FFFFFF";
      ctx.fillRect(0, 0, width, height);
      ctx.drawImage(decoded, 0, 0);
      if (typeof decoded.close === "function") decoded.close();

      return await new Promise((resolve, reject) => {
        canvas.toBlob(blobPng => {
          if (blobPng) resolve(blobPng);
          else reject(new Error("Falha ao gerar PNG"));
        }, "image/png");
      });
    }

    async function getCopyableImageBlob(imageUrl, storeName) {
      let lastError = null;

      for (const candidateUrl of imageProxyUrls(imageUrl, storeName)) {
        try {
          const response = await fetch(candidateUrl, { cache: "no-store" });
          if (!response.ok) throw new Error("HTTP " + response.status);

          const buffer = await response.arrayBuffer();
          if (!buffer.byteLength) throw new Error("Imagem vazia");

          const mimeType = detectImageMime(buffer, response.headers.get("content-type"), candidateUrl);
          const imageBlob = new Blob([buffer], { type: mimeType });
          return await convertImageToPng(imageBlob);
        } catch (error) {
          lastError = error;
        }
      }

      throw lastError || new Error("Nao foi possivel copiar a imagem");
    }

    function createCard(p, store) {
      const card = document.createElement("div"); card.className = "product-card";

      const badge = document.createElement("div"); badge.className = "store-badge store-dufrio";
      badge.textContent = store;

      const imgWrap = document.createElement("div"); imgWrap.className = "product-img-wrap";
      const img = document.createElement("img");
      img.src = p.image; img.alt = p.title;
      img.onerror = () => img.src = "https://placehold.co/260x260/111/333?text="+store;
      const overlay = document.createElement("div"); overlay.className = "img-overlay";
      const overlaySpan = document.createElement("span"); overlaySpan.textContent = "📷 Copiar Foto";
      overlay.appendChild(overlaySpan);
      imgWrap.appendChild(img); imgWrap.appendChild(overlay);
      imgWrap.onclick = async () => {
        const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || ('ontouchstart' in window);
        
        if (isMobile) {
          overlaySpan.textContent = "⏳ Aguarde...";
          try {
            const blob = await getCopyableImageBlob(p.image, "Dufrio");
            const fileName = (p.title.substring(0, 40).replace(/[^a-zA-Z0-9]/g, '_') || 'produto') + '.png';
            const file = new File([blob], fileName, { type: "image/png" });

            if (navigator.canShare && navigator.canShare({ files: [file] })) {
              await navigator.share({ files: [file], title: p.title });
            } else if (navigator.share) {
              await navigator.share({ title: p.title, url: p.image });
            } else {
              window.open(p.image, '_blank');
            }
            overlay.classList.add("copied"); overlaySpan.textContent = "✅ Compartilhado!";
            setTimeout(()=>{overlay.classList.remove("copied");overlaySpan.textContent="📤 Compartilhar";},1800);
          } catch(e) {
            if (e.name === 'AbortError') {
              overlaySpan.textContent = "📤 Compartilhar";
            } else {
              window.open(p.image, '_blank');
              overlaySpan.textContent = "📤 Compartilhar";
            }
          }
        } else {
          overlaySpan.textContent = "⏳...";
          try {
            const blob = await getCopyableImageBlob(p.image, "Dufrio");

            await navigator.clipboard.write([
              new ClipboardItem({ "image/png": blob })
            ]);
            overlay.classList.add("copied"); overlaySpan.textContent = "✅ Copiado!";
            setTimeout(()=>{overlay.classList.remove("copied");overlaySpan.textContent="📷 Copiar Foto";},1800);
          } catch(e) {
            console.error("Erro ao copiar imagem:", e);
            overlay.classList.add("copied"); overlaySpan.textContent = "⚠️ Erro ao Copiar";
            setTimeout(()=>{overlay.classList.remove("copied");overlaySpan.textContent="📷 Copiar Foto";},1800);
          }
        }
      };
      const isMobileDevice = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || ('ontouchstart' in window);
      overlaySpan.textContent = isMobileDevice ? "📤 Compartilhar" : "📷 Copiar Foto";

      const info = document.createElement("div"); info.className = "product-info";
      const hint = document.createElement("div"); hint.className = "copy-hint"; hint.textContent = "COPIAR";
      
      const titleDiv = document.createElement("div"); titleDiv.className = "product-title"; 
      titleDiv.innerHTML = "<span>" + p.title + "</span>";
      
      const pricesWrap = document.createElement("div"); pricesWrap.className = "prices-wrap";
      
      const priceVista = document.createElement("div"); priceVista.className = "price-vista";
      const spotMatch = p.spot.match(/^(R\$\s*[\d.,]+)(.*)$/);
      const mainPrice = spotMatch ? spotMatch[1].trim() : p.spot;
      const discountBit = spotMatch && spotMatch[2] ? spotMatch[2].trim() : "";
      priceVista.innerHTML = `<span>${mainPrice}</span>`;
      if (discountBit) {
        const badge = document.createElement("span");
        badge.className = "discount-badge";
        badge.textContent = discountBit;
        priceVista.appendChild(badge);
      }
      
      const priceInstall = document.createElement("div"); priceInstall.className = "price-install"; 
      priceInstall.textContent = p.install;
      
      pricesWrap.appendChild(priceVista); 
      pricesWrap.appendChild(priceInstall);
      
      info.appendChild(hint); info.appendChild(titleDiv); info.appendChild(pricesWrap);
      info.onclick = () => {
        const txt = formatCopyText(p.title, p.spot, p.install);
        navigator.clipboard.writeText(txt);
        hint.textContent = "✅ COPIADO!"; info.classList.add("copied");
        setTimeout(()=>{hint.textContent="COPIAR";info.classList.remove("copied");},1800);
      };

      const footer = document.createElement("div"); footer.className = "card-footer";
      const btnLink = document.createElement("button"); btnLink.className = "btn-link"; btnLink.textContent = "🔗 Ver na Dufrio";
      btnLink.onclick = () => window.open(p.link,"_blank");
      footer.appendChild(btnLink);

      card.appendChild(badge); card.appendChild(imgWrap); card.appendChild(info); card.appendChild(footer);
      return card;
    }

    window.onload = loadData;
  </script>
