<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Scraper Oficial</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:,">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #050505; --card-bg: rgba(18,18,28,0.85); --card-border: rgba(255,255,255,0.08); --green: #00e676; --blue: #4facfe; --text: #ffffff; --muted: #7a7a9a; --radius: 16px; }
    body { font-family: "Outfit", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    .aurora { position: fixed; border-radius: 50%; filter: blur(130px); z-index: 0; pointer-events: none; opacity: 0.22; animation: auroraAnim 18s infinite alternate ease-in-out; }
    .a1 { width: 700px; height: 700px; background: #3b82f6; top: -15%; left: -15%; }
    .a2 { width: 600px; height: 600px; background: #7c3aed; bottom: -15%; right: -10%; animation-duration: 24s; }
    @keyframes auroraAnim { 0% { transform: scale(1) translate(0,0); } 100% { transform: scale(1.4) translate(60px,-60px); } }

    .btn-back { position: fixed; top: 16px; left: 16px; z-index: 999; background: rgba(255,255,255,0.06); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.12); color: #fff; padding: 6px 14px; border-radius: 30px; text-decoration: none; font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 5px; transition: 0.2s; }
    .btn-back:hover { background: rgba(255,255,255,0.12); transform: translateY(-1px); }
    .btn-back svg { width: 12px; height: 12px; stroke: currentColor; stroke-width: 2.5; fill: none; }

    .container { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 70px 24px 100px; text-align: center; }
    .page-header { margin-bottom: 48px; }
    .page-header h1 { font-size: 34px; font-weight: 900; letter-spacing: -1.5px; text-transform: uppercase; font-style: italic; background: linear-gradient(135deg, #4facfe, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
    .page-header p { font-size: 10px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid var(--card-border); padding-bottom: 28px; }

    .step-section { display: none; flex-direction: column; align-items: center; gap: 20px; animation: slideUp 0.5s cubic-bezier(0.22,1,0.36,1) forwards; margin-top: 8px; }
    .step-section.active { display: flex; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    h2 { font-size: 16px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 12px; margin-top: 20px; }

    .options-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 14px; width: 100%; }
    .option-btn { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid var(--card-border); padding: 14px 28px; border-radius: 12px; cursor: pointer; transition: all 0.2s; color: var(--text); font-weight: 800; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; font-family: "Outfit", sans-serif; }
    .option-btn:hover { border-color: #4facfe55; background: rgba(79,172,254,0.08); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(79,172,254,0.1); }
    .tipo-btn { display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 24px 20px; width: 190px; }
    .tipo-btn img { width: 150px; transition: transform 0.3s; filter: drop-shadow(0 0 14px rgba(79,172,254,0.35)); mix-blend-mode: screen; }
    .tipo-btn:hover img { transform: scale(1.06); filter: drop-shadow(0 0 20px rgba(79,172,254,0.6)); }

    .option-btn.selected { background: rgba(79,172,254,0.15); border-color: rgba(79,172,254,0.6); box-shadow: 0 0 20px rgba(79,172,254,0.25); color: #fff; }
    .tipo-btn.selected img { transform: scale(1.06); filter: drop-shadow(0 0 25px rgba(79,172,254,0.7)); }

    #loading-results { display: none; flex-direction: column; align-items: center; gap: 14px; padding: 50px; margin-top: 20px; }
    .spinner { width: 36px; height: 36px; border: 3px solid rgba(79,172,254,0.15); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-msg { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: var(--blue); }
    @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    .loading-sheet { color: var(--blue); font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; animation: pulse 1.5s infinite; text-align: center; width: 100%; padding: 40px 0; }

    /* GRID DE PRODUTOS */
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 22px; margin-top: 28px; width: 100%; }

    /* CARD */
    .product-card { background: linear-gradient(180deg, rgba(18,18,28,0.95), rgba(12,12,20,0.98)); border: 1px solid var(--card-border); border-radius: var(--radius); overflow: hidden; backdrop-filter: blur(16px); display: flex; flex-direction: column; transition: all 0.25s; position: relative; box-shadow: 0 14px 36px rgba(0,0,0,0.28); }
    .product-card:hover { border-color: rgba(79,172,254,0.3); transform: translateY(-3px); box-shadow: 0 16px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(79,172,254,0.1); }

    /* LOJA BADGE */
    .store-badge { position: absolute; top: 12px; left: 12px; z-index: 3; background: rgba(18,18,28,0.9); border: 1px solid rgba(255,255,255,0.1); padding: 3px 10px; border-radius: 20px; font-size: 9px; font-weight: 900; color: white; letter-spacing: 1.5px; text-transform: uppercase; backdrop-filter: blur(8px); }
    .store-badge.store-frigelar { background: linear-gradient(135deg, rgba(0,89,36,0.95), rgba(0,230,118,0.2)); border-color: rgba(0,230,118,0.3); }
    .store-badge.store-leveros { background: linear-gradient(135deg, #ff6b00, #ff9e00); border-color: #ff9e00; }
    .store-badge.store-centralar { background: linear-gradient(135deg, rgba(160,30,100,0.95), rgba(236,72,153,0.25)); border-color: rgba(236,72,153,0.4); }
    .store-badge.store-dufrio { background: linear-gradient(135deg, #004a99, #007bff); border-color: #007bff; }
    .store-badge.store-dufrio { background: linear-gradient(135deg, #004a99, #007bff); border-color: #007bff; }
    .store-badge.store-friopecas { background: linear-gradient(135deg, #005ca8, #2563eb); border-color: rgba(37,99,235,0.55); }
    .store-badge.store-webcontinental { background: linear-gradient(135deg, #0f766e, #14b8a6); border-color: rgba(20,184,166,0.55); }
    .store-badge.store-climario { background: linear-gradient(135deg, #b45309, #f59e0b); border-color: rgba(245,158,11,0.55); }
    .store-badge.store-poloar { background: linear-gradient(135deg, #004f9f, #ef3b2d); border-color: rgba(239,59,45,0.55); }

    /* FOTO */
    .product-img-wrap { width: 100%; aspect-ratio: 1.08/1; background: #ffffff; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; border-bottom: 1px solid rgba(255,255,255,0.12); }
    .product-img-wrap img { width: 90%; height: 90%; object-fit: contain; transition: transform 0.3s; }
    .product-img-wrap:hover img { transform: scale(1.045); }
    .img-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.55); display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.2s; }
    .img-overlay span { font-size: 10px; font-weight: 900; letter-spacing: 2px; color: white; text-transform: uppercase; background: rgba(79,172,254,0.3); border: 1px solid rgba(79,172,254,0.5); padding: 8px 16px; border-radius: 8px; }
    .product-img-wrap:hover .img-overlay { opacity: 1; }
    .img-overlay.copied span { background: rgba(0,230,118,0.3); border-color: rgba(0,230,118,0.5); color: var(--green); }

    /* INFO AREA */
    .product-info { padding: 20px 14px 10px; cursor: pointer; position: relative; flex: 1; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 178px; }
    .product-info:hover { background: rgba(255,255,255,0.02); }
    .copy-hint { position: absolute; top: 10px; right: 10px; font-size: 8px; font-weight: 900; color: rgba(79,172,254,0.6); letter-spacing: 1px; text-transform: uppercase; opacity: 0; transition: 0.2s; z-index: 5; }
    .product-info:hover .copy-hint { opacity: 1; }
    .product-info.copied .copy-hint { opacity: 1; color: var(--green); content: "COPIADO!"; }

    .product-title { font-size: 15px; font-weight: 850; color: #ffffff; line-height: 1.32; margin-bottom: 16px; text-align: center; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; width: 100%; min-height: 79px; overflow: hidden; overflow-wrap: break-word; word-break: break-word; }
    .prices-wrap { display: flex; flex-direction: column; gap: 6px; align-items: center; width: 100%; text-align: center; background: rgba(3,3,10,0.62); padding: 14px 10px; border-radius: 13px; border: 1px solid rgba(255,255,255,0.06); box-shadow: inset 0 1px 0 rgba(255,255,255,0.03); margin-top: auto; }
    
    .price-vista { font-size: 21px; font-weight: 900; color: #00e676; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; text-align: center; text-shadow: 0 0 14px rgba(0,230,118,0.2); letter-spacing: 0; }
    .discount-badge { font-size: 10px; font-weight: 800; color: #00e676; background: rgba(0,230,118,0.12); border: 1px solid rgba(0,230,118,0.3); padding: 3px 10px; border-radius: 20px; letter-spacing: 0.5px; white-space: nowrap; }
    
    .price-install { font-size: 12px; color: #b7b7c8; font-weight: 700; text-align: center; line-height: 1.35; }

    /* BOTAO LINK */
    .card-footer { margin-top: auto; padding: 8px 14px 12px; border-top: 1px solid rgba(255,255,255,0.04); background: rgba(255,255,255,0.015); }
    .btn-link { display: block; width: 100%; padding: 8px; border-radius: 9px; background: rgba(79,172,254,0.08); border: 1px solid rgba(79,172,254,0.22); color: #79bdff; font-size: 9px; font-weight: 900; letter-spacing: 1.7px; text-transform: uppercase; text-align: center; cursor: pointer; transition: all 0.2s; font-family: "Outfit", sans-serif; }
    .btn-link:hover { background: linear-gradient(135deg, rgba(79,172,254,0.25), rgba(167,139,250,0.25)); border-color: rgba(79,172,254,0.5); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(79,172,254,0.15); }

    @media (max-width: 768px) {
      .container { padding: 50px 16px 60px; }

      .btn-back { top: 12px; left: 12px; padding: 5px 10px; font-size: 8px; }
      .btn-back svg { width: 10px; height: 10px; }

      .page-header { margin-bottom: 30px; }
      .page-header h1 { font-size: 24px; letter-spacing: -1px; margin-bottom: 6px; }
      .page-header p { font-size: 9px; padding-bottom: 16px; }

      h2 { font-size: 13px; margin-top: 16px; margin-bottom: 10px; }

      .options-grid { gap: 10px; }
      .option-btn { padding: 10px 16px; font-size: 10px; }
      .tipo-btn { width: 100%; flex-direction: row; padding: 16px 12px; gap: 10px; }
      .tipo-btn img { width: 70px; }
      .tipo-btn span { font-size: 12px; }

      .products-grid { grid-template-columns: minmax(0, 1fr); gap: 18px; margin-top: 22px; }
      .product-card { border-radius: 16px; max-width: 640px; width: 100%; margin: 0 auto; }
      .product-img-wrap { aspect-ratio: 4/3; }
      .product-img-wrap img { width: 88%; height: 88%; }
      .product-info { padding: 22px 20px 12px; min-height: 178px; }
      .product-title { font-size: 18px; line-height: 1.22; margin-bottom: 18px; min-height: auto; -webkit-line-clamp: 3; }
      .prices-wrap { padding: 16px 14px; gap: 7px; border-radius: 14px; }
      .price-vista { font-size: 25px; }
      .discount-badge { font-size: 9px; padding: 3px 9px; }
      .price-install { font-size: 13px; }
      .card-footer { padding: 8px 18px 14px; }
      .btn-link { padding: 9px; font-size: 9px; letter-spacing: 1.8px; opacity: 0.82; }

      .store-badge { font-size: 8px; padding: 2px 8px; }

      #selection-summary { padding: 12px 16px; flex-direction: column; gap: 10px; }
      .summary-text { font-size: 11px; }
      .summary-text span { padding: 4px 10px; font-size: 10px; }
      .btn-reset { padding: 8px 16px; font-size: 10px; }

      #filters-section { padding: 16px; gap: 12px; }
      .filter-group h3 { font-size: 10px; margin-bottom: 8px; }
      .filter-row { gap: 6px; }
      .filter-btn { padding: 6px 12px; font-size: 9px; border-radius: 16px; }

      .sync-status { bottom: 16px; right: 16px; padding: 8px 14px; font-size: 9px; }
      .sync-dot { width: 6px; height: 6px; }
    }

    @media (max-width: 480px) {
      .container { padding: 40px 12px 50px; }

      .btn-back { top: 10px; left: 10px; padding: 4px 8px; font-size: 7px; }
      .btn-back svg { width: 9px; height: 9px; }

      .page-header { margin-bottom: 24px; }
      .page-header h1 { font-size: 18px; letter-spacing: 0px; margin-bottom: 4px; }
      .page-header p { font-size: 8px; padding-bottom: 12px; letter-spacing: 0.5px; }

      h2 { font-size: 11px; margin-top: 14px; margin-bottom: 8px; letter-spacing: 0px; }

      .options-grid { gap: 8px; }
      .option-btn { padding: 8px 12px; font-size: 9px; }
      .tipo-btn { padding: 12px 8px; gap: 8px; }
      .tipo-btn img { width: 55px; }
      .tipo-btn span { font-size: 11px; }

      .products-grid { grid-template-columns: minmax(0, 1fr); gap: 16px; }
      .product-card { border-radius: 16px; }
      .product-info { padding: 20px 16px 12px; min-height: 168px; }
      .product-title { font-size: 16px; line-height: 1.25; margin-bottom: 14px; -webkit-line-clamp: 3; }
      .product-img-wrap { aspect-ratio: 4/3; }
      .product-img-wrap img { width: 88%; height: 88%; }
      .img-overlay span { font-size: 9px; padding: 6px 12px; }

      .prices-wrap { padding: 14px 12px; gap: 5px; border-radius: 12px; }
      .price-vista { font-size: 23px; gap: 3px; }
      .discount-badge { font-size: 8px; padding: 2px 7px; }
      .price-install { font-size: 12px; line-height: 1.35; }

      .card-footer { padding: 7px 14px 12px; }
      .btn-link { padding: 8px; font-size: 8px; border-radius: 8px; opacity: 0.76; }

      .store-badge { font-size: 7px; padding: 2px 6px; top: 8px; left: 8px; }
      .copy-hint { font-size: 7px; top: 6px; right: 6px; }

      #selection-summary { padding: 10px 12px; flex-direction: column; gap: 8px; margin-bottom: 16px; }
      .summary-text { font-size: 10px; }
      .summary-text span { padding: 3px 8px; font-size: 9px; }
      .btn-reset { padding: 6px 12px; font-size: 9px; }

      #filters-section { padding: 12px; gap: 10px; margin-bottom: 20px; }
      .filter-group h3 { font-size: 9px; margin-bottom: 6px; }
      .filter-row { gap: 5px; }
      .filter-btn { padding: 5px 10px; font-size: 8px; border-radius: 14px; }

      .sync-status { bottom: 12px; right: 12px; padding: 6px 10px; font-size: 8px; }
      .sync-dot { width: 5px; height: 5px; }

      #loading-results { padding: 30px; }
      .spinner { width: 28px; height: 28px; border-width: 2px; }
      #loading-msg { font-size: 10px; }
    }

    /* SUMMARY BAR */
    #selection-summary { width: 100%; background: var(--card-bg); border: 1px solid var(--card-border); padding: 16px 24px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; backdrop-filter: blur(12px); flex-wrap: wrap; gap: 14px; }
    .summary-text { font-size: 13px; font-weight: 800; color: #fff; text-transform: uppercase; letter-spacing: 1px; display: flex; gap: 12px; flex-wrap: wrap; }
    .summary-text span { background: rgba(79,172,254,0.15); padding: 6px 14px; border-radius: 8px; border: 1px solid rgba(79,172,254,0.3); color: var(--blue); }
    .btn-reset { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); padding: 10px 20px; border-radius: 8px; color: #fff; font-weight: 800; font-size: 12px; cursor: pointer; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px; font-family: "Outfit", sans-serif; }
    .btn-reset:hover { background: rgba(255,255,255,0.15); transform: translateY(-2px); border-color: rgba(255,255,255,0.3); }

    /* FILTERS */
    #filters-section { width: 100%; display: flex; flex-direction: column; gap: 20px; margin-bottom: 30px; background: rgba(18,18,28,0.5); padding: 24px; border-radius: 12px; border: 1px solid var(--card-border); }
    .filter-group h3 { font-size: 11px; font-weight: 900; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; text-align: left; }
    .filter-row { display: flex; flex-wrap: wrap; gap: 10px; }
    .filter-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: #a1a1aa; padding: 8px 16px; border-radius: 20px; font-size: 11px; font-weight: 800; cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 1px; font-family: "Outfit", sans-serif; }
    .filter-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .filter-btn.active { background: rgba(79,172,254,0.2); border-color: rgba(79,172,254,0.5); color: var(--blue); box-shadow: 0 0 10px rgba(79,172,254,0.2); }
    .filter-btn.store-frigelar.active { background: rgba(0,230,118,0.2); border-color: rgba(0,230,118,0.5); color: var(--green); box-shadow: 0 0 10px rgba(0,230,118,0.2); }
    .filter-btn.store-leveros.active { background: rgba(255,107,0,0.2); border-color: rgba(255,107,0,0.5); color: #ff6b00; box-shadow: 0 0 10px rgba(255,107,0,0.2); }
    .filter-btn.store-centralar.active { background: rgba(236,72,153,0.2); border-color: rgba(236,72,153,0.5); color: #ec4899; box-shadow: 0 0 10px rgba(236,72,153,0.2); }
    .filter-btn.store-friopecas.active { background: rgba(37,99,235,0.2); border-color: rgba(37,99,235,0.5); color: #60a5fa; box-shadow: 0 0 10px rgba(37,99,235,0.2); }
    .filter-btn.store-webcontinental.active { background: rgba(20,184,166,0.2); border-color: rgba(20,184,166,0.5); color: #2dd4bf; box-shadow: 0 0 10px rgba(20,184,166,0.2); }
    .filter-btn.store-climario.active { background: rgba(245,158,11,0.2); border-color: rgba(245,158,11,0.5); color: #fbbf24; box-shadow: 0 0 10px rgba(245,158,11,0.2); }
    .filter-btn.store-poloar.active { background: rgba(239,59,45,0.2); border-color: rgba(239,59,45,0.5); color: #ef4444; box-shadow: 0 0 10px rgba(239,59,45,0.2); }

    /* SYNC STATUS */
    .sync-status { position: fixed; bottom: 20px; right: 20px; z-index: 1000; background: rgba(18,18,28,0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); padding: 10px 18px; border-radius: 30px; display: flex; align-items: center; gap: 10px; font-size: 10px; font-weight: 800; color: #fff; text-transform: uppercase; letter-spacing: 1.5px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); transition: all 0.4s ease; cursor: default; }
    .sync-dot { width: 8px; height: 8px; border-radius: 50%; }
    .sync-status.loading .sync-dot { background: #f59e0b; box-shadow: 0 0 10px #f59e0b; animation: pulse-dot 1s infinite alternate; }
    .sync-status.success .sync-dot { background: #00e676; box-shadow: 0 0 10px #00e676; }
    .sync-status.error .sync-dot { background: #ff5252; box-shadow: 0 0 10px #ff5252; }
    @keyframes pulse-dot { from { opacity: 0.4; transform: scale(0.8); } to { opacity: 1; transform: scale(1.2); } }
  </style>
</head>
<body>
  <div id="sync-status" class="sync-status loading">
    <div class="sync-dot"></div>
    <span id="sync-text">Conectando</span>
  </div>
  <div style="position:fixed;inset:0;background:#050505;z-index:-2;pointer-events:none;"></div>
  <div class="aurora a1"></div>
  <div class="aurora a2"></div>
  <a href="index.html" class="btn-back">
    <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
    Menu Principal
  </a>
  <div class="container">
    <div class="page-header">
      <h1>Scraper Oficial</h1>
      <p>Comparação de preços em tempo real entre múltiplas lojas</p>
    </div>
    <div id="step-tipo" class="step-section active">
      <h2>Selecione o Tipo</h2>
      <div class="options-grid" id="tipo-options"></div>
    </div>
    <div id="step-btus" class="step-section">
      <h2>Selecione os BTUs</h2>
      <div class="options-grid" id="btu-options"></div>
    </div>
    <div id="step-ciclo" class="step-section">
      <h2>Selecione o Ciclo</h2>
      <div class="options-grid" id="ciclo-options"></div>
    </div>
    <div id="loading-results">
      <div class="spinner"></div>
      <p id="loading-msg">Consultando Lojas...</p>
    </div>
    <div id="step-resultados" class="step-section" style="width:100%;">
      <div id="selection-summary" style="display:none;">
        <div class="summary-text" id="summary-text"></div>
        <button class="btn-reset" onclick="resetScraper()">🔄 Refazer Busca</button>
      </div>
      
      <div id="filters-section" style="display:none;">
        <div class="filter-group">
          <h3>Lojas Encontradas</h3>
          <div class="filter-row" id="filter-lojas"></div>

    async function scrapeFrigelar(url) {
      try {
        // Frigelar usa Oracle Commerce Cloud. O HTML inicial não tem os produtos (Client-Side Rendering).
        // Precisamos interceptar a API interna substituindo /searchresults por /ccstoreui/v1/search
        let apiUrl = url;
        if (url.includes('/searchresults')) {
            apiUrl = url.replace('/searchresults', '/ccstoreui/v1/search');
            // Limpa parâmetros malformados ("?&&&=undefined") usando a API URL nativa
            // A regex antiga estava cortando parte do N= - agora usamos URLSearchParams para remover apenas a chave vazia
            try {
                const urlObj = new URL(apiUrl);
                urlObj.searchParams.delete(''); // remove o "=undefined" que tem chave vazia
                apiUrl = urlObj.toString();
            } catch(e) {
                // fallback se URL for inválida por algum motivo
                apiUrl = apiUrl.replace(/[?&]+=*undefined/gi, '').replace(/&&+/g, '&').replace(/\?&/g, '?');
            }
        } else {
            return []; // Se não for um link de busca padrão, ignora
        }

        // Usa o nosso Cloudflare Worker dedicado como proxy CORS para a Frigelar
        // Worker em: https://frigelar-proxy.crftwo.workers.dev/
        const FRIGELAR_PROXY = "https://frigelar-proxy.crftwo.workers.dev/?url=";
        
        // Cache-buster pra forçar resposta fresca a cada busca
        try {
          const u = new URL(apiUrl);
          u.searchParams.set('_', Date.now());
          apiUrl = u.toString();
        } catch(_) { apiUrl += (apiUrl.includes('?') ? '&' : '?') + '_=' + Date.now(); }

        let json = null;
        try {
          const proxyUrl = FRIGELAR_PROXY + encodeURIComponent(apiUrl);
          const resp = await fetch(proxyUrl, { cache: 'no-store' });
          if (resp.ok) {
            const text = await resp.text();
            if (text.includes('resultsList')) {
              json = JSON.parse(text);
            }
          }
        } catch(e) { console.error("Frigelar Worker erro:", e); }
        
        if (!json) return [];
        
        if (!json.resultsList || !json.resultsList.records) {
            return [];
        }

        const items = json.resultsList.records;
        
        return items.map(agg => {
           if (!agg.records || agg.records.length === 0) return null;
           const attr = agg.records[0].attributes;
           if (!attr) return null;
           
           // Filtra produtos FORA DE ESTOQUE — a Frigelar ainda os retorna na API mas não os mostra no site
           const availability = attr['sku.availabilityStatus'] ? attr['sku.availabilityStatus'][0] : '';
           if (availability !== 'INSTOCK') return null;
           
           const title = attr['product.displayName'] ? attr['product.displayName'][0] : "";
           
           let image = "";
           if (attr['product.primaryMediumImageURL']) {
               image = "https://www.frigelar.com.br" + attr['product.primaryMediumImageURL'][0];
           }
           
           const spotPriceNum = attr['sku.activePrice'] ? parseFloat(attr['sku.activePrice'][0]) : 0;
           const listPriceNum = attr['sku.listPrice'] ? parseFloat(attr['sku.listPrice'][0]) : 0;
           
           if (!spotPriceNum) return null;
           
           // Calcula desconto PIX (ex: "Com 7% OFF no PIX")
           // A Frigelar usa: listPrice = preço cheio parcelado, activePrice = preço à vista com desconto
           let spotLine = "R$ " + spotPriceNum.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2});
           if (listPriceNum > spotPriceNum) {
               const descontoPct = Math.round((listPriceNum - spotPriceNum) / listPriceNum * 100);
               if (descontoPct > 0) spotLine += ` Com ${descontoPct}% OFF no PIX`;
           }
           
           // Frigelar sempre parcelada em 8x sem juros
           let installLine = "";
           if (listPriceNum > spotPriceNum) {
               const totalParcelado = listPriceNum.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2});
               const valorParcela = (listPriceNum / 8).toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2});
               installLine = `ou R$ ${totalParcelado} em 8x de R$ ${valorParcela} sem juros`;
           }
           
           const linkSlug = attr['product.route'] ? attr['product.route'][0] : "";
           const finalLink = linkSlug ? "https://www.frigelar.com.br" + linkSlug : "";
           
           return { title, image, spot: spotLine, install: installLine, link: finalLink, discount: 0 };
        }).filter(Boolean);
      } catch(e) { console.error("Frigelar erro:", e); return []; }
    }

    async function scrapeLeveros(url) {
      try {
        // Cache-buster pra forçar resposta fresca a cada busca
        let freshUrl = url;
        try {
          const u = new URL(url);
          u.searchParams.set('_', Date.now());
          freshUrl = u.toString();
        } catch(_) { freshUrl = url + (url.includes('?') ? '&' : '?') + '_=' + Date.now(); }
        const proxyUrl = "https://corsproxy.io/?" + encodeURIComponent(freshUrl);
        const resp = await fetch(proxyUrl, { cache: 'no-store' });
        const html = await resp.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, "text/html");
        
        const items = Array.from(doc.querySelectorAll('.products__item.product-card'));
        return items.map(card => {
          const titleEl = card.querySelector('.product-card__bottom__name');
          if (!titleEl) return null;
          const title = titleEl.innerText.trim();
          
          const imgEl = card.querySelector('.product-card__img-container img');
          const image = imgEl ? (imgEl.getAttribute('data-src') || imgEl.getAttribute('src') || "") : "";
          
          const spotEl = card.querySelector('.prices__price');
          const spotSupportEl = card.querySelector('.prices__support-text');
          let spotLine = spotEl ? spotEl.innerText.trim() : "";
          if (spotSupportEl && spotSupportEl.innerText.includes('à vista')) {
            spotLine += " à vista";
          }
          
          const installEl = card.querySelector('.installment');
          let installLine = "";
          if (installEl) {
            const rawInstall = installEl.innerText.replace(/\s+/g, ' ').trim();
            // Tenta capturar o número de parcelas e o valor de cada uma
            const match = rawInstall.match(/(\d+)x\s+de\s+R\$\s*([\d.,]+)/i);
            if (match) {
              const parcelas = parseInt(match[1]);
              const valorParcelaStr = match[2].replace('.', '').replace(',', '.');
              const valorParcela = parseFloat(valorParcelaStr);
              const total = (parcelas * valorParcela).toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2});
              installLine = `ou R$ ${total} em ${parcelas}x de R$ ${match[2]}`;
            } else {
              installLine = rawInstall;
            }
          }
          
          const linkEl = card.querySelector('.product-card__bottom a');
          let finalLink = linkEl ? linkEl.getAttribute('href') : "";
          if (finalLink && !finalLink.startsWith('http')) finalLink = "https://www.leveros.com.br" + finalLink;
          
          if (!spotLine) return null;
          return { title, image, spot: spotLine, install: installLine, link: finalLink, discount: 0 };
        }).filter(Boolean);
      } catch(e) { console.error("Leveros erro:", e); return []; }
    }

    async function scrapeCentralAr(url) {
      // Lógica portada do piloto scraper-centralar.html (foto da listagem ambientada).
      // Usa corsproxy.io e cai no worker da Frigelar como fallback.
      const PROXY_DEFAULT = "https://corsproxy.io/?";
      const PROXY_WORKER  = "https://frigelar-proxy.crftwo.workers.dev/?url=";
      const CARD_SELECTORS = [
        '.product-listing-item','.product__item','.product-grid-item','.product-item',
        '.searchPageProductWrapper > *','.tile-product',
        'li[class*="product-item"]','div[class*="ProductGridItem"]','article[class*="product"]',
        '[class*="product-tile"]','[class*="ProductTile"]','[data-product-id]','[data-product-code]',
        '.pdc_product-item','.card-product'
      ];

      async function fetchHtml(target) {
        // Cache-buster pra forçar resposta fresca a cada busca
        let fresh = target;
        try {
          const u = new URL(target);
          u.searchParams.set('_', Date.now());
          fresh = u.toString();
        } catch(_) { fresh = target + (target.includes('?') ? '&' : '?') + '_=' + Date.now(); }
        const tryProxy = async (base) => {
          const r = await fetch(base + encodeURIComponent(fresh), { cache: 'no-store' });
          if (!r.ok) throw new Error("HTTP " + r.status);
          return await r.text();
        };
        try { return await tryProxy(PROXY_DEFAULT); }
        catch(e1) { return await tryProxy(PROXY_WORKER); }
      }

      try {
        const html = await fetchHtml(url);
        const doc = new DOMParser().parseFromString(html, "text/html");

        let cards = [];
        for (const sel of CARD_SELECTORS) {
          const found = doc.querySelectorAll(sel);
          if (found.length > 0) { cards = Array.from(found); break; }
        }
        console.log(`📊 Central Ar: ${cards.length} cards brutos`);
        if (!cards.length) return [];

        const seen = new Set();
        const result = cards.map(card => {
          const titleEl = card.querySelector('a.name, .product-name, [class*="title"], h2, h3');
          if (!titleEl) return null;
          const title = titleEl.innerText.trim();
          if (!title || seen.has(title)) return null;

          // Link
          let link = '';
          const linkCandidates = [
            card.querySelector('a.name'),
            card.querySelector('a.thumb'),
            card.querySelector('a[href*="/p/"]'),
            card.querySelector('a[href*="/produto/"]'),
            (card.tagName === 'A' ? card : null),
            card.closest('a[href]'),
            card.querySelector('a[href]:not([href=""]):not([href="#"])')
          ];
          for (const el of linkCandidates) {
            if (el) {
              const h = el.getAttribute('href') || '';
              if (h && h !== '#' && !h.startsWith('javascript:')) { link = h; break; }
            }
          }
          if (link && !link.startsWith('http')) {
            link = 'https://www.centralar.com.br' + (link.startsWith('/') ? '' : '/') + link;
          }

          // Imagem ambientada — preferir a.thumb img
          let image = '';
          const thumbImg = card.querySelector('a.thumb img, .thumb img, picture img');
          const candidates = thumbImg ? [thumbImg] : Array.from(card.querySelectorAll('img'));
          imageLoop: for (const imgEl of candidates) {
            const attrs = ['data-src','data-original','data-lazy-src','srcset','data-srcset','src'];
            for (const attr of attrs) {
              let s = imgEl.getAttribute(attr);
              if (!s || typeof s !== 'string') continue;
              if (s.startsWith('data:image')) continue;
              if (attr.includes('srcset') || s.includes(' ')) s = s.split(',')[0].trim().split(' ')[0];
              if (!s || s.endsWith('.svg') || s.includes('/_ui/')) continue;
              if (s.startsWith('//')) s = 'https:' + s;
              if (s.startsWith('/'))  s = 'https://www.centralar.com.br' + s;
              image = s;
              break imageLoop;
            }
          }

          // Preços via regex no innerText do card
          const cardText = card.innerText.replace(/\s+/g, ' ').trim();
          const allPrices = [...cardText.matchAll(/r\$\s*([\d.]+,\d{2})/gi)];
          if (allPrices.length === 0) return null;
          const priceCash = parseFloat(allPrices[0][1].replace(/\./g, '').replace(',', '.'));
          if (!priceCash) return null;

          const spotLine = "R$ " + priceCash.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + " à vista";

          let installLine = "";
          const instMatch = cardText.match(/(?:ou\s+)?r\$\s*[\d.,]+\s*(?:em|até|ate)?\s*\d+\s*x\s*de\s*r\$\s*[\d.,]+/i);
          if (instMatch) {
            installLine = instMatch[0]
              .replace(/sem\s+juros/gi, '')
              .replace(/\s+/g, ' ')
              .replace(/^(\s*ou\s+)?/i, 'ou ')
              .replace(/\s+(em|até|ate)\s+/i, ' até ')
              .trim();
          } else {
            const fb = cardText.match(/\d+\s*x\s*de\s*r\$\s*[\d.,]+/i);
            if (fb) installLine = fb[0].trim();
          }

          seen.add(title);
          return { title, image, spot: spotLine, install: installLine, link, discount: 0 };
        }).filter(Boolean);

        console.log(`✅ Central Ar: ${result.length} produtos após filtro`);
        return result;
      } catch(e) { console.error("Central Ar erro:", e); return []; }
    }

    async function scrapePoloAr(url) {
      const STORE_URL = "https://www.poloar.com.br";
      const PROXIES = [
        "https://frigelar-proxy.crftwo.workers.dev/?url=",

      ];

        const pool = credit.length ? credit : installments.filter(item => Number(item.NumberOfInstallments || 0) > 1);
        if (!pool.length) return "";

        const best = pool.reduce((a, b) =>
          Number(a.NumberOfInstallments || 0) > Number(b.NumberOfInstallments || 0) ? a : b
        );
        const count = Number(best.NumberOfInstallments || 0);
        const total = Number(best.TotalValuePlusInterestRate || (Number(best.Value || 0) * count));
        const value = Number(best.Value || (total / count));
        if (!count || !total || !value) return "";

        return `ou ${formatCurrency(total)} até ${count}x de ${formatCurrency(value)}`;
      };
      const buildProductLink = (product, sku) => {
        const base = product.link || (product.linkText ? `${STORE_URL}/${product.linkText}/p` : STORE_URL);
        const clean = base.startsWith("http") ? base : STORE_URL + base;
        const skuId = sku?.itemId || sku?.sku;
        if (!skuId || clean.includes("skuId=")) return clean;
        return `${clean}${clean.includes("?") ? "&" : "?"}skuId=${encodeURIComponent(skuId)}`;
      };
      const getSortPrice = (product) => {
        const productOffer = getProductOffer(product);
        if (!productOffer) return Number.MAX_SAFE_INTEGER;
        const { offer } = productOffer;
        return Number(getPixPrice(offer) || offer.Price || offer.SpotPrice || offer.ListPrice || Number.MAX_SAFE_INTEGER);
      };

      try {
        const apiUrl = buildCatalogApiUrl(url);
        if (!apiUrl) return [];

        const cycleFilter = getCycleFilterFromUrl(url);
        const rawProducts = await fetchCatalogProducts(apiUrl);
        const seen = new Set();

        return rawProducts
          .filter(product => product && product.productName && productMatchesCycleFilter(product, cycleFilter))
          .filter(product => {
            const id = product.productId || product.linkText || product.productName;
            if (seen.has(id)) return false;
            seen.add(id);
            return true;
          })
          .sort((a, b) => getSortPrice(a) - getSortPrice(b))
          .map(product => {
            const productOffer = getProductOffer(product);
            if (!productOffer) return null;

            const { sku, offer } = productOffer;
            const pixPrice = getPixPrice(offer);
            const basePrice = Number(offer.Price || offer.SpotPrice || offer.ListPrice || 0);
            const cash = pixPrice > 0 ? pixPrice : basePrice;

            return {
              title: product.productName,
              image: sku.images?.[0]?.imageUrl || "",
              spot: cash > 0 ? `${formatCurrency(cash)} à vista` : "Consulte o site",
              install: formatInstallment(offer),
              link: buildProductLink(product, sku),
              discount: 0
            };
          })
          .filter(Boolean);
      } catch(e) { console.error("WebContinental erro:", e); return []; }
    }


    async function scrapeClimario(url) {
      const STORE_URL = "https://www.climario.com.br";
      const API_PROXIES = [
        "https://frigelar-proxy.crftwo.workers.dev/?url=",
        "https://api.codetabs.com/v1/proxy?quest=",
        "https://api.allorigins.win/get?url="
      ];

      const normalizeText = (value) => String(value || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase();
      const normText = (value) => normalizeText(value).replace(/[\s\-_.]/g, "");
      const formatCurrency = (value) => new Intl.NumberFormat("pt-BR", {
        style: "currency",
        currency: "BRL"
      }).format(value).replace(/\u00a0/g, " ");
      const pathParts = (value) => String(value || "")
        .replace(/^\/+|\/+$/g, "")
        .split("/")
        .map(part => part.trim())
        .filter(Boolean);
      const getOrderParam = (parsedUrl) => {
        const order = parsedUrl.searchParams.get("order") || parsedUrl.searchParams.get("O") || "";
        const value = String(order).toLowerCase();
        if (value.includes("desc")) return "OrderByPriceDESC";
        if (value.includes("topsale")) return "OrderByTopSaleDESC";
        return "OrderByPriceASC";
      };
      const getTypeSlug = () => {
        const type = normText(selection?.tipo || "");
        if (type.includes("piso")) return "ar-condicionado-piso-teto";
        if (type.includes("cassete")) return "ar-condicionado-cassete";
        if (type.includes("hiwall") || type.includes("hi")) return "ar-condicionado-hi-wall-inverter";
        return "";
      };
      const isKnownTypeSlug = (segment) => {
        const value = normText(segment);
        return value.includes("arcondicionadohiwall") ||
               value.includes("arcondicionadopisoteto") ||
               value.includes("arcondicionadocassete");
      };
      const buildCatalogApiUrls = (searchUrl) => {
        let parsed;
        try { parsed = new URL(searchUrl); } catch(e) { return []; }

        const queryParts = pathParts(parsed.searchParams.get("query") || parsed.pathname || "/");
        const initialParts = pathParts(parsed.searchParams.get("initialQuery"));
        const mapParts = String(parsed.searchParams.get("map") || "")
          .split(",")
          .map(part => part.trim())
          .filter(Boolean);

        let baseParts = initialParts.length
          ? [...initialParts]
          : queryParts.slice(0, Math.min(2, queryParts.length));
        const extraParts = queryParts.slice(baseParts.length);
        const extraMaps = mapParts.slice(baseParts.length);

        const allParts = [...baseParts, ...extraParts];
        const hasTypeInUrl = allParts.some(isKnownTypeSlug);
        const typeSlug = getTypeSlug();

        // Alguns links ClimaRio trazem BTU/ciclo sem explicitar a categoria.
        // A selecao do usuario completa apenas esse tipo, mantendo os filtros da URL da planilha.
        if (!hasTypeInUrl && typeSlug && normText(baseParts[0]).includes("arcondicionado")) {
          baseParts = [baseParts[0], typeSlug, ...baseParts.slice(1)];
        }

        const groups = [];
        extraParts.forEach((segment, index) => {
          const key = normText(extraMaps[index] || `extra-${index}`);
          const value = normText(segment);
          if (!segment || key.includes("ciclo") || value.includes("quentefrio")) return;
          if (isKnownTypeSlug(segment) && baseParts.some(part => normText(part) === value)) return;

          let group = groups.find(item => item.key === key);
          if (!group) {
            group = { key, values: [] };
            groups.push(group);
          }
          group.values.push(segment);
        });

        const combinations = groups.length
          ? groups.reduce((acc, group) => acc.flatMap(combo => group.values.map(value => [...combo, value])), [[]])
          : [[]];

        const order = getOrderParam(parsed);
        const seen = new Set();
        return combinations
          .map(combo => [...baseParts, ...combo].filter(Boolean))
          .filter(parts => parts.length)
          .map(parts => {
            const path = parts.map(part => encodeURIComponent(part)).join("/");
            const map = parts.map(() => "c").join(",");
            return `${STORE_URL}/api/catalog_system/pub/products/search/${path}?map=${map}&O=${order}`;
          })
          .filter(apiUrl => {
            if (seen.has(apiUrl)) return false;
            seen.add(apiUrl);
            return true;
          });
      };
      const getCycleFilterFromUrl = (searchUrl) => {
        let parsed;
        try { parsed = new URL(searchUrl); } catch(e) { return ""; }

        const parts = pathParts(parsed.searchParams.get("query") || parsed.pathname || "/");
        const maps = String(parsed.searchParams.get("map") || "").split(",").map(item => item.trim());
        const cycleIndex = maps.findIndex(map => normText(map).includes("ciclo"));
        const segment = cycleIndex >= 0 ? parts[cycleIndex] : parts.find(part => normText(part).includes("quentefrio"));
        const value = normText(segment);
        if (value.includes("quente")) return "quente";
        if (value.includes("frio")) return "frio";
        return "";
      };
      const extractBtuValues = (value) => {
        const text = normText(value);
        const values = [];
        const re = /(\d{1,3})000btu/g;
        let match;
        while ((match = re.exec(text)) !== null) values.push(Number(match[1]) * 1000);
        return values;
      };
      const getBtuFiltersFromUrl = (searchUrl) => {
        let parsed;
        try { parsed = new URL(searchUrl); } catch(e) { return []; }

        const parts = pathParts(parsed.searchParams.get("query") || parsed.pathname || "/");
        return [...new Set(parts.flatMap(extractBtuValues))];
      };
      const productMatchesAirConditioner = (product) => normText(product.productName || "").includes("arcondicionado");
      const productMatchesBtuFilter = (product, btuFilters) => {
        if (!btuFilters.length) return true;
        const haystack = [
          product.productName || "",
          ...(product.categories || []),
          ...(product["Capacidade de Climatização"] || []),
          ...(product["Capacidade de Climatizacao"] || []),
          ...(product["Capacidade BTU/h"] || [])
        ].join(" ");
        const productBtus = extractBtuValues(haystack);
        return productBtus.some(value => btuFilters.includes(value));
      };
      const productMatchesCycleFilter = (product, cycleFilter) => {
        if (!cycleFilter) return true;
        const haystack = normText([
          product.productName || "",
          ...(product.Ciclo || []),
          ...(product["Ciclo do Ar Condicionado"] || [])
        ].join(" "));

        if (cycleFilter === "quente") return haystack.includes("quente");
        if (cycleFilter === "frio") return haystack.includes("frio") && !haystack.includes("quente");
        return true;
      };
      const fetchApiText = async (targetUrl) => {
        let lastError = null;
        for (const proxy of API_PROXIES) {
          try {
            const resp = await fetch(proxy + encodeURIComponent(targetUrl), { cache: "no-store" });
            if (!resp.ok && resp.status !== 206) throw new Error("HTTP " + resp.status);

            if (proxy.includes("allorigins")) {
              const json = await resp.json();
              if (json && json.contents) return json.contents;
              throw new Error("Resposta sem contents");
            }

            return await resp.text();
          } catch(e) {
            lastError = e;
          }
        }
        throw lastError || new Error("Falha na API VTEX ClimaRio");
      };
      const fetchCatalogProducts = async (apiUrl) => {
        const products = [];
        for (let from = 0; from < 300; from += 50) {
          const to = from + 49;
          const sep = apiUrl.includes("?") ? "&" : "?";
          const raw = await fetchApiText(`${apiUrl}${sep}_from=${from}&_to=${to}&_=${Date.now()}`);
          let data;
          try { data = JSON.parse(raw); } catch(e) { break; }
          if (!Array.isArray(data) || data.length === 0) break;
          products.push(...data);
          if (data.length < 50) break;
        }
        return products;
      };
      const getPixPrice = (offer) => {
        const installments = Array.isArray(offer?.Installments) ? offer.Installments : [];
        const pix = installments.find(item => normText(`${item.PaymentSystemName || ""} ${item.Name || ""}`).includes("pix") && Number(item.NumberOfInstallments || 1) === 1)
          || installments.find(item => normText(`${item.PaymentSystemName || ""} ${item.Name || ""}`).includes("pix"));
        const installmentValue = Number(pix?.Value || pix?.TotalValuePlusInterestRate || 0);
        if (installmentValue > 0) return installmentValue;

        const options = offer?.PaymentOptions?.installmentOptions || [];
        const pixOption = options.find(option => normText(option?.paymentName).includes("pix"));
        const pixInstallment = pixOption?.installments?.find(item => Number(item.count || 0) === 1)
          || pixOption?.installments?.[0];
        const cents = Number(pixInstallment?.total || pixInstallment?.value || 0);
        return cents > 0 ? cents / 100 : 0;
      };
      const getProductOffer = (product) => {
        const candidates = [];
        const items = Array.isArray(product.items) ? product.items : [];
        for (const sku of items) {
          const sellers = Array.isArray(sku.sellers) ? sku.sellers : [];
          for (const seller of sellers) {
            const offer = seller?.commertialOffer || {};
            const price = Number(offer.Price || offer.SpotPrice || offer.ListPrice || 0);
            const quantity = Number(offer.AvailableQuantity ?? 1);
            if (price > 0 && offer.IsAvailable !== false && quantity > 0) {
              candidates.push({ sku, offer, sortPrice: getPixPrice(offer) || price });
            }
          }
        }
        candidates.sort((a, b) => a.sortPrice - b.sortPrice);
        return candidates[0] || null;
      };
      const formatInstallment = (offer) => {
        const installments = Array.isArray(offer?.Installments) ? offer.Installments : [];
        const credit = installments.filter(item =>
          Number(item.NumberOfInstallments || 0) > 1 &&
          Number(item.InterestRate || 0) === 0 &&
          normText(item.PaymentSystemGroupName || "").includes("creditcard")
        );
        const pool = credit.length ? credit : installments.filter(item => Number(item.NumberOfInstallments || 0) > 1);
        if (!pool.length) return "";

        const best = pool.reduce((a, b) =>
          Number(a.NumberOfInstallments || 0) > Number(b.NumberOfInstallments || 0) ? a : b
        );
        const count = Number(best.NumberOfInstallments || 0);
        const value = Number(best.Value || 0);
        const total = Number((value * count).toFixed(2));
        if (!count || !total || !value) return "";

        return `ou ${formatCurrency(total)} até ${count}x de ${formatCurrency(value)}`;
      };
      const buildProductLink = (product) => {
        if (product.link) return product.link;
        return product.linkText ? `${STORE_URL}/${product.linkText}/p` : STORE_URL;
      };
      const getSortPrice = (product) => {
        const productOffer = getProductOffer(product);
        if (!productOffer) return Number.MAX_SAFE_INTEGER;
        const { offer } = productOffer;
        return Number(getPixPrice(offer) || offer.Price || offer.SpotPrice || offer.ListPrice || Number.MAX_SAFE_INTEGER);
      };
      const sortCatalogProducts = (products, searchUrl) => {
        let parsed;
        try { parsed = new URL(searchUrl); } catch(e) { return products; }
        const desc = getOrderParam(parsed) === "OrderByPriceDESC";
        return products.sort((a, b) => desc ? getSortPrice(b) - getSortPrice(a) : getSortPrice(a) - getSortPrice(b));
      };

      try {
        const apiUrls = buildCatalogApiUrls(url);
        const cycleFilter = getCycleFilterFromUrl(url);
        const btuFilters = getBtuFiltersFromUrl(url);
        const rawProducts = [];

        for (const apiUrl of apiUrls) {
          try {
            rawProducts.push(...await fetchCatalogProducts(apiUrl));
          } catch(e) {
            console.warn("ClimaRio Catalog API falhou:", apiUrl, e);
          }
        }

        const seen = new Set();
        const uniqueProducts = rawProducts
          .filter(product =>
            product &&
            product.productName &&
            productMatchesAirConditioner(product) &&
            productMatchesBtuFilter(product, btuFilters) &&
            productMatchesCycleFilter(product, cycleFilter)
          )
          .filter(product => {
            const id = product.productId || product.linkText || product.productName;
            if (seen.has(id)) return false;
            seen.add(id);
            return true;
          });

        return sortCatalogProducts(uniqueProducts, url)
          .map(product => {
            const productOffer = getProductOffer(product);
            if (!productOffer) return null;

            const { sku, offer } = productOffer;
            const pixPrice = getPixPrice(offer);
            const basePrice = Number(offer.SpotPrice || offer.Price || offer.ListPrice || 0);
            const cash = pixPrice > 0 ? pixPrice : basePrice;

            return {
              title: product.productName,
              image: sku.images?.[0]?.imageUrl || "",
              spot: cash > 0 ? `${formatCurrency(cash)} à vista` : "Consulte o site",
              install: formatInstallment(offer),
              link: buildProductLink(product),
              discount: 0
            };
          })
          .filter(Boolean);
      } catch(e) { console.error("ClimaRio erro:", e); return []; }
    }

    function extractProductInfo(p) {
      let marca = "Outras";
      for (const m of LISTA_MARCAS) {
        if (p.title.toLowerCase().includes(m.toLowerCase())) {
          marca = m; break;
        }
      }
      let btu = "";
      // Remove pontos para facilitar o match (ex: 9.000 -> 9000)
      const titleClean = p.title.replace(/\./g, "");
      const btuMatch = titleClean.match(/\b(\d{4,5})\s*BTU/i) || titleClean.match(/\b(\d{4,5})\b/);
      if (btuMatch) {
        let bNum = btuMatch[1];
        btu = bNum.replace(/\B(?=(\d{3})+(?!\d))/g, ".") + " BTUs";
      } else if (selection && selection.btu) {
        // Fallback para o que o usuário escolheu
        btu = selection.btu.replace(/\B(?=(\d{3})+(?!\d))/g, ".") + " BTUs";
      } else {
        btu = "Outros"; // Apenas caso extremo
      }
      
      let ciclo = "Só Frio";
      if (p.title.toLowerCase().includes("quente")) ciclo = "Quente/Frio";
      p.marca = marca; p.btu = btu; p.ciclo = ciclo;
      return p;
    }

    function generateFilters() {

      const btus = [...new Set(allFetchedProducts.map(p=>p.btu))].sort((a,b)=>parseInt(a)-parseInt(b));
      const ciclos = [...new Set(allFetchedProducts.map(p=>p.ciclo))].sort();
      renderFilterRow("filter-lojas", lojas, "lojas");
      renderFilterRow("filter-marcas", marcas, "marcas");
      renderFilterRow("filter-btus", btus, "btus");
      renderFilterRow("filter-ciclos", ciclos, "ciclos");
      document.getElementById("filters-section").style.display = (allFetchedProducts.length > 0) ? "flex" : "none";
    }

    function renderFilterRow(id, items, type) {
      const c = document.getElementById(id); c.innerHTML = "";
      if (items.length <= 1 && type !== "marcas" && type !== "lojas") {
          c.parentElement.style.display = "none";
          return;
      }
      c.parentElement.style.display = "block";
      items.forEach(item => {
        const btn = document.createElement("button");
        btn.className = "filter-btn"; 
        if (type === "lojas") {
            const storeKey = item.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
            if (storeKey === "frigelar") btn.classList.add("store-frigelar");
            if (storeKey === "leveros") btn.classList.add("store-leveros");
            if (storeKey === "central ar") btn.classList.add("store-centralar");
            if (storeKey === "friopecas") btn.classList.add("store-friopecas");
            if (storeKey === "webcontinental") btn.classList.add("store-webcontinental");
            if (storeKey === "climario") btn.classList.add("store-climario");
            if (storeKey === "polo ar") btn.classList.add("store-poloar");
        }
        btn.innerText = item;
        btn.onclick = () => toggleFilter(btn, type, item);
        c.appendChild(btn);
      });
    }

    function toggleFilter(btn, type, value) {
      const idx = activeFilters[type].indexOf(value);
      if (idx > -1) { activeFilters[type].splice(idx, 1); btn.classList.remove("active"); }
      else { activeFilters[type].push(value); btn.classList.add("active"); }
      applyFilters();
    }

    function applyFilters() {
      const grid = document.getElementById("results-grid"); grid.innerHTML = "";
      const filtered = allFetchedProducts.filter(p => {
        const l = activeFilters.lojas.length === 0 || activeFilters.lojas.includes(p.storeName);
        const m = activeFilters.marcas.length === 0 || activeFilters.marcas.includes(p.marca);
        const b = activeFilters.btus.length === 0 || activeFilters.btus.includes(p.btu);
        const c = activeFilters.ciclos.length === 0 || activeFilters.ciclos.includes(p.ciclo);
        return l && m && b && c;
      });
      if (filtered.length === 0) grid.innerHTML = "<p style=\"grid-column:1/-1;color:var(--muted);font-size:13px;text-transform:uppercase;font-weight:800;text-align:center;padding:40px 0;\">Nenhum produto atende aos filtros atuais.</p>";
      else filtered.forEach(p => grid.appendChild(createCard(p, p.storeName)));
    }

    function resetScraper() {
      selection = {tipo:"",btu:"",ciclo:""};
      allFetchedProducts = [];
      activeFilters = { lojas: [], marcas: [], btus: [], ciclos: [] };
      document.getElementById("results-grid").innerHTML = "";
      document.getElementById("filters-section").style.display = "none";
      document.getElementById("selection-summary").style.display = "none";
      showStep("step-tipo");
    }

    function normalizeCopyImageUrl(url) {
      let cleanUrl = String(url || "").trim();
      if (!cleanUrl) throw new Error("Imagem ausente");

      if (cleanUrl.includes("workers.dev") && cleanUrl.includes("url=")) {
        try {
          cleanUrl = new URL(cleanUrl).searchParams.get("url") || cleanUrl;
        } catch (_) {}
      }

      if (cleanUrl.startsWith("//")) cleanUrl = "https:" + cleanUrl;
      return cleanUrl;
    }

    function imageProxyUrls(url, storeName) {
      const cleanUrl = normalizeCopyImageUrl(url);
      const store = String(storeName || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
      const proxied = [
        "https://wsrv.nl/?url=" + encodeURIComponent(cleanUrl),
        "https://images.weserv.nl/?url=" + encodeURIComponent(cleanUrl),
        "https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(cleanUrl)
      ];
      const urls = (store === "frigelar" || store === "central ar" || store === "friopecas" || store === "webcontinental" || store === "climario")
        ? [...proxied, cleanUrl]
        : [cleanUrl, ...proxied];
      return [...new Set(urls)];
    }

    function detectImageMime(buffer, contentType, sourceUrl) {
      const bytes = new Uint8Array(buffer.slice(0, 12));
      if (bytes[0] === 0xff && bytes[1] === 0xd8 && bytes[2] === 0xff) return "image/jpeg";
      if (bytes[0] === 0x89 && bytes[1] === 0x50 && bytes[2] === 0x4e && bytes[3] === 0x47) return "image/png";
      if (bytes[0] === 0x47 && bytes[1] === 0x49 && bytes[2] === 0x46) return "image/gif";
      if (bytes[0] === 0x52 && bytes[1] === 0x49 && bytes[2] === 0x46 && bytes[8] === 0x57 && bytes[9] === 0x45) return "image/webp";

      const headerType = String(contentType || "").split(";")[0].trim().toLowerCase();
      if (headerType.startsWith("image/")) return headerType;

      const lowerUrl = String(sourceUrl || "").toLowerCase();
      if (lowerUrl.includes(".png")) return "image/png";
      if (lowerUrl.includes(".webp")) return "image/webp";
      return "image/jpeg";
    }

    async function decodeImageBlob(blob) {
      if (typeof createImageBitmap === "function") {
        try {
          return await createImageBitmap(blob);
        } catch (_) {}
      }

      return await new Promise((resolve, reject) => {
        const objectUrl = URL.createObjectURL(blob);
        const image = new Image();
        image.onload = () => {
          URL.revokeObjectURL(objectUrl);
          resolve(image);
        };
        image.onerror = () => {
          URL.revokeObjectURL(objectUrl);
          reject(new Error("Falha ao decodificar imagem"));
        };
        image.src = objectUrl;
      });
    }

    async function convertImageToPng(blob) {
      const decoded = await decodeImageBlob(blob);
      const width = decoded.width || decoded.naturalWidth;
      const height = decoded.height || decoded.naturalHeight;
      if (!width || !height) throw new Error("Imagem sem dimensoes");

      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#FFFFFF";
      ctx.fillRect(0, 0, width, height);
      ctx.drawImage(decoded, 0, 0);
      if (typeof decoded.close === "function") decoded.close();

      return await new Promise((resolve, reject) => {
        canvas.toBlob(blobPng => {
          if (blobPng) resolve(blobPng);
          else reject(new Error("Falha ao gerar PNG"));
        }, "image/png");
      });
    }

    async function getCopyableImageBlob(imageUrl, storeName) {
      let lastError = null;

      for (const candidateUrl of imageProxyUrls(imageUrl, storeName)) {
        try {
          const response = await fetch(candidateUrl, { cache: "no-store" });
          if (!response.ok) throw new Error("HTTP " + response.status);

          const buffer = await response.arrayBuffer();
          if (!buffer.byteLength) throw new Error("Imagem vazia");

          const mimeType = detectImageMime(buffer, response.headers.get("content-type"), candidateUrl);
          const imageBlob = new Blob([buffer], { type: mimeType });
          return await convertImageToPng(imageBlob);
        } catch (error) {
          lastError = error;
        }
      }

      throw lastError || new Error("Nao foi possivel copiar a imagem");
    }

    function createCard(p, store) {
      const card = document.createElement("div"); card.className = "product-card";

      const badge = document.createElement("div"); badge.className = "store-badge";
      const storeKey = String(store || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
      if (storeKey === "frigelar") badge.classList.add("store-frigelar");
      if (storeKey === "leveros") badge.classList.add("store-leveros");
      if (storeKey === "central ar") badge.classList.add("store-centralar");
      if (storeKey === "friopecas") badge.classList.add("store-friopecas");
      if (storeKey === "webcontinental") badge.classList.add("store-webcontinental");
      if (storeKey === "climario") badge.classList.add("store-climario");
      if (storeKey === "polo ar") badge.classList.add("store-poloar");
      badge.textContent = store;

      const imgWrap = document.createElement("div"); imgWrap.className = "product-img-wrap";
      const img = document.createElement("img");
      img.src = p.image; img.alt = p.title;
      img.onerror = () => img.src = "https://placehold.co/260x260/111/333?text="+store;
      const overlay = document.createElement("div"); overlay.className = "img-overlay";
      const overlaySpan = document.createElement("span"); overlaySpan.textContent = "📷 Copiar Foto";
      overlay.appendChild(overlaySpan);
      imgWrap.appendChild(img); imgWrap.appendChild(overlay);
      imgWrap.onclick = async () => {
        const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || ('ontouchstart' in window);
        
        if (isMobile) {
          // Mobile: busca a imagem pelo proxy (resolve CORS) e compartilha o arquivo real
          overlaySpan.textContent = "⏳ Aguarde...";
          try {
            const blob = await getCopyableImageBlob(p.image, p.storeName);
            const fileName = (p.title.substring(0, 40).replace(/[^a-zA-Z0-9]/g, '_') || 'produto') + '.png';
            const file = new File([blob], fileName, { type: "image/png" });

            if (navigator.canShare && navigator.canShare({ files: [file] })) {
              // Compartilha o arquivo de imagem real (iOS 15+ e Android Chrome)
              await navigator.share({ files: [file], title: p.title });
            } else if (navigator.share) {
              // Fallback: compartilha só a URL se files não for suportado
              await navigator.share({ title: p.title, url: p.image });
            } else {
              window.open(p.image, '_blank');
            }
            overlay.classList.add("copied"); overlaySpan.textContent = "✅ Compartilhado!";
            setTimeout(()=>{overlay.classList.remove("copied");overlaySpan.textContent="📤 Compartilhar";},1800);
          } catch(e) {
            if (e.name === 'AbortError') {
              overlaySpan.textContent = "📤 Compartilhar"; // usuário cancelou
            } else {
              // fallback final: abre imagem em nova aba
              window.open(p.image, '_blank');
              overlaySpan.textContent = "📤 Compartilhar";
            }
          }
        } else {
          // Desktop: copia imagem para clipboard
          overlaySpan.textContent = "⏳...";
          try {
            const blob = await getCopyableImageBlob(p.image, p.storeName);

            await navigator.clipboard.write([
              new ClipboardItem({ "image/png": blob })
            ]);
            overlay.classList.add("copied"); overlaySpan.textContent = "✅ Copiado!";
            setTimeout(()=>{overlay.classList.remove("copied");overlaySpan.textContent="📷 Copiar Foto";},1800);
          } catch(e) {
            console.error("Erro ao copiar imagem:", e);
            overlay.classList.add("copied"); overlaySpan.textContent = "⚠️ Erro ao Copiar";
            setTimeout(()=>{overlay.classList.remove("copied");overlaySpan.textContent="📷 Copiar Foto";},1800);
          }
        }
      };
      // Adapta o label do overlay conforme o dispositivo
      const isMobileDevice = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || ('ontouchstart' in window);
      overlaySpan.textContent = isMobileDevice ? "📤 Compartilhar" : "📷 Copiar Foto";

      const info = document.createElement("div"); info.className = "product-info";
      const hint = document.createElement("div"); hint.className = "copy-hint"; hint.textContent = "COPIAR";
      
      const titleDiv = document.createElement("div"); titleDiv.className = "product-title"; 
      titleDiv.innerHTML = "<span>" + p.title + "</span>";
      
      const pricesWrap = document.createElement("div"); pricesWrap.className = "prices-wrap";
      
      const priceVista = document.createElement("div"); priceVista.className = "price-vista";
      // Separa o valor principal do desconto ("5% de Desconto" / "Com 7% OFF no PIX")
      const spotMatch = p.spot.match(/^(R\$\s*[\d.,]+)(.*)$/);
      const mainPrice = spotMatch ? spotMatch[1].trim() : p.spot;
      const discountBit = spotMatch && spotMatch[2] ? spotMatch[2].trim() : "";
      priceVista.innerHTML = `<span>${mainPrice}</span>`;
      if (discountBit) {
        const badge = document.createElement("span");
        badge.className = "discount-badge";
        badge.textContent = discountBit;
        priceVista.appendChild(badge);
      }
      
      const priceInstall = document.createElement("div"); priceInstall.className = "price-install"; 
      priceInstall.textContent = p.install;
      
      pricesWrap.appendChild(priceVista); 
      pricesWrap.appendChild(priceInstall);
      
      info.appendChild(hint); info.appendChild(titleDiv); info.appendChild(pricesWrap);
      info.onclick = () => {
        const txt = formatCopyText(p.title, p.spot, p.install);
        navigator.clipboard.writeText(txt);
        hint.textContent = "✅ COPIADO!"; info.classList.add("copied");
        setTimeout(()=>{hint.textContent="COPIAR";info.classList.remove("copied");},1800);
      };

      const footer = document.createElement("div"); footer.className = "card-footer";
      const btnLink = document.createElement("button"); btnLink.className = "btn-link"; btnLink.textContent = "🔗 Abrir na Loja";
      btnLink.onclick = () => window.open(p.link,"_blank");
      footer.appendChild(btnLink);

      card.appendChild(badge); card.appendChild(imgWrap); card.appendChild(info); card.appendChild(footer);
      return card;
    }

    window.onload = loadData;
  </script>
