<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Hub</title><meta name="viewport" content="width=device-width, initial-scale=1.0"><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;font-family:Outfit,system-ui,sans-serif;color:#f7fafc;background:radial-gradient(circle at 8% 0%,rgba(56,189,248,.13),transparent 360px),radial-gradient(circle at 88% 10%,rgba(34,197,94,.08),transparent 320px),linear-gradient(180deg,#06080b,#0a0d12);overflow-x:hidden}.container{width:min(1160px,calc(100% - 40px));margin:auto;padding:26px 0 42px}.topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:18px}.brand{display:flex;align-items:center;gap:14px}.signature{display:flex;align-items:center;gap:10px;color:#cbd5e1;font-size:11px;font-weight:900;letter-spacing:2.6px;text-transform:uppercase;cursor:pointer}.signature-mark{width:8px;height:8px;border-radius:999px;background:#38bdf8;box-shadow:0 0 18px rgba(56,189,248,.45)}.brand-divider{width:1px;height:18px;background:rgba(148,163,184,.16)}h1{font-size:clamp(30px,5vw,48px);line-height:.92;font-weight:900;letter-spacing:-2px}button,a{font:inherit;color:inherit}.quick-search-btn{border:1px solid rgba(148,163,184,.16);border-radius:999px;background:rgba(255,255,255,.045);color:#cbd5e1;padding:10px 15px;font-size:12px;font-weight:850;cursor:pointer}.command-panel{position:relative;z-index:20;max-width:1040px;margin:0 auto 32px;padding:12px;border:1px solid rgba(148,163,184,.16);border-radius:24px;background:linear-gradient(180deg,rgba(255,255,255,.058),rgba(255,255,255,.025));box-shadow:0 24px 80px rgba(0,0,0,.36)}#toolSearchInput{width:100%;height:58px;padding:0 18px;border:1px solid rgba(148,163,184,.18);border-radius:18px;background:rgba(4,7,12,.68);color:#f7fafc;font-size:16px;font-weight:750;outline:none}.search-dropdown{position:absolute;left:12p );grid-template-columns:repeat(2,minmax(0,260px));grid-auto-rows:250px}.featured{grid-column:span 2;grid-row:span 1}.lab-grid{width:min(100%,536px);grid-template-columns:repeat(2,minmax(0,260px));grid-auto-rows:200px}.section-head{width:min(100%,536px)}}@media(max-width:680px){.container{width:min(100% - 28px,1160px)}.topbar,.brand,.section-head,.meta-footer{align-items:flex-start;flex-direction:column}.brand-divider{display:none}.quick-search-btn{width:100%}.tool-grid,.lab-grid{width:100%;grid-template-columns:1fr;grid-auto-rows:auto}.tool-card,.featured,.lab-card{grid-column:span 1;grid-row:span 1;min-height:220px}.overlay,.quick-search-modal{padding:10px}.quick-search-content{height:calc(100dvh - 20px)}}</style></head><body><div class="container"><header class="topbar"><div class="brand"><div id="thiagoLogo" class="signature"><span class="signature-mark"></span><span>THIAGO LUZ</span></div><span class="brand-divider"></span><h1>Hub</h1></div><button id="quickSearchBtn" class="quick-search-btn" type="button">Busca rápida</button></header><section class="command-panel"><input id="toolSearchInput" type="search" placeholder="Buscar ferramenta, loja ou scraper..." autocomplete="off"><div id="searchDropdown" class="search-dropdown"></div></section><main><section class="section"><div class="section-head"><h2 class="section-title">Ar-condicionado</h2><span class="section-count">3 ferramentas</span></div><div class="tool-grid" id="gridAr"></div></section><section class="section"><div class="section-head"><h2 class="section-title">Câmara fria</h2><span class="section-count">4 ferramentas</span></div><div class="tool-grid" id="gridCamara"></div></section><section class="section"><div class="section-head"><h2 class="section-title">Laboratório de Scrapers</h2><span class="section-count">8 lojas</span></div><div class="tool-grid lab-grid" id="gridLabs"></div></section></main><footer class="meta-footer"><div><div class="status-line">● Online</div><p class="footer-small">criado function norm(v){return String(v||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase()}function card(i,c=''){let a=document.createElement('a');a.className=`tool-card ${i.featured?'featured':''} ${c}`.trim();a.href=i.arquivo;a.style.setProperty('--c',i.color);a.title=i.detail;a.innerHTML=`<div class="tool-top"><div class="icon-box">${ic}</div><span class="tool-kind">${i.categoria}</span></div><div class="tool-body"><div class="tool-name">${i.nome}</div><p class="tool-short">${i.short}</p><span class="tool-action">Abrir</span></div>`;return a}function renderCards(){tools.filter(i=>i.category==='ar').forEach(i=>gridAr.appendChild(card(i)));tools.filter(i=>i.category==='camara').forEach(i=>gridCamara.appendChild(card(i)));labs.forEach(i=>gridLabs.appendChild(card(i,'lab-card')))}function openItem(i){location.href=i.arquivo}function setupSearch(){let items=[...tools.filter(i=>i.category!=='hidden'),...labs].map(i=>({...i,searchText:norm(`${i.nome} ${i.categoria} ${i.short} ${i.detail} ${i.aliases||''}`)})),active=-1,res=[];function close(){searchDropdown.classList.remove('is-open');active=-1}function set(i){[...searchDropdown.querySelectorAll('.search-result')].forEach(b=>b.classList.remove('is-active'));active=i;searchDropdown.querySelectorAll('.search-result')[i]?.classList.add('is-active')}function render(){let t=norm(toolSearchInput.value.trim());searchDropdown.innerHTML='';if(!t)return close();res=items.filter(i=>i.searchText.includes(t)).slice(0,5);searchDropdown.classList.add('is-open');if(!res.length){searchDropdown.innerHTML='<div class="search-empty">Não encontrei. Tente buscar por loja, ferramenta ou categoria.</div>';return}res.forEach((i,n)=>{let b=document.createElement('button');b.type='button';b.className='search-result';b.innerHTML=`<span class="result-name"><span>${i.nome}</span><span class="result-meta">${i.categoria}</span></span><span class="result-desc">${i.short}</span>`;b.onmouseenter=()=>set(n);b.onclick=()=>openItem(i);searchDropdow
