<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Hub de Ferramentas Dufrio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">

  <style>
    /* Reset & Globals */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --bg-base: #050505;
      --card-bg: rgba(20, 20, 20, 0.6);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-main: #ffffff;
      --text-muted: #888888;
      --font-outfit: 'Outfit', sans-serif;
    }

    body {
      font-family: var(--font-outfit);
      min-height: 100vh;
      background: var(--bg-base);
      color: var(--text-main);
      overflow-x: hidden;
      font-feature-settings: "cv01", "cv02";
    }
    
    /* Decorações Fluídas Escuras (Nebulosa/Aurora) */
    .aurora {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      filter: blur(120px);
      z-index: -1;
      opacity: 0.25;
      animation: auroraAnim 15s infinite alternate ease-in-out;
    }
    .aurora-1 { background: #3b82f6; top: -10%; left: -10%; } /* Azul */
    .aurora-2 { background: #8b5cf6; bottom: -10%; right: -5%; animation-duration: 20s; } /* Roxo */
    .aurora-3 { background: #10b981; top: 40%; left: 40%; animation-duration: 25s; filter: blur(150px); opacity: 0.15; } /* Verde Esmeralda */

    @keyframes auroraAnim {
      0% { transform: scale(1) translate(0, 0); }
      100% { transform: scale(1.3) translate(50px, -50px); }
    }

    /* Container Principal */
    .dashboard-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 60px 40px;
    }

    @media (max-width: 768px) {
      .dashboard-container {
        padding: 30px 16px;
      }
    }

    @media (max-width: 480px) {
      .dashboard-container {
        padding: 20px 12px;
      }
    }

    /* Header Novo e Futurista */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 60px;
      gap: 20px;
    }
    .header-text h1 {
      font-size: 42px;
      font-weight: 900;
      color: var(--text-main);
      letter-spacing: -2px;
      margin-bottom: 8px;
    }
    .header-text p {
      font-size: 16px;
      color: var(--text-muted);
      font-weight: 400;
      letter-spacing: 0px;
    }
    .logo-container img {
      height: 40px;
      object-fit: contain;
      filter: invert(1) brightness(1.2);
      mix-blend-mode: screen;
      flex-shrink: 0;
    }

    @media (max-width: 768px) {
      .header {
        flex-direction: row;
        align-items: center;
        gap: 14px;
        margin-bottom: 36px;
      }
      .header-text { flex: 1 1 auto; min-width: 0; }
      .header-text h1 {
        font-size: 28px;
        letter-spacing: -1px;
        overflow-wrap: anywhere;
      }
      .header-text p {
        font-size: 13px;
        line-height: 1.4;
      }
      .logo-container {
        flex-shrink: 0;
      }
      .logo-container img {
        height: 34px;
      }
    }

    @media (max-width: 480px) {
      .header {
        gap: 10px;
        margin-bottom: 24px;
      }
      .header-text h1 {
        font-size: 22px;
        letter-spacing: -0.5px;
      }
      .header-text p {
        font-size: 12px;
      }
      .logo-container img {
        height: 28px;
      }
    }

    /* Telas bem pequenas: header empilha pra não brigar com a logo */
    @media (max-width: 360px) {
      .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }
      .logo-container img { height: 26px; }
    }

    /* Títulos de Seção Minimalistas */
    .section-title {
      font-size: 14px;
      font-weight: 800;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 50px;
      margin-bottom: 20px;
      opacity: 0.8;
    }

    @media (max-width: 768px) {
      .section-title {
        font-size: 12px;
        margin-top: 35px;
        margin-bottom: 15px;
        letter-spacing: 1px;
      }
    }

    @media (max-width: 480px) {
      .section-title {
        font-size: 11px;
        margin-top: 25px;
        margin-bottom: 12px;
      }
    }

    .bento-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      grid-auto-rows: minmax(180px, auto);
      margin-bottom: 50px;
    }

    @media (max-width: 1200px) {
      .bento-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
      }
    }

    @media (max-width: 768px) {
      .bento-grid {
        grid-template-columns: 1fr;
        gap: 12px;
        margin-bottom: 30px;
      }
    }

    @media (max-width: 480px) {
      .bento-grid {
        gap: 10px;
      }
    }

    /* Cards Ultrasleek */
    .bento-card {
      --card-radius: 28px;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: var(--card-radius);
      padding: 30px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      isolation: isolate;
      background-clip: padding-box;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 200px;
    }

    @media (max-width: 768px) {
      .bento-card {
        --card-radius: 22px;
        padding: 20px;
        border-radius: var(--card-radius);
        min-height: auto;
      }
    }

    @media (max-width: 480px) {
      .bento-card {
        padding: 16px;
        border-radius: var(--card-radius);
      }
    }
    
    .bento-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 2px;
      background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0.5;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    @media (hover: hover) and (pointer: fine) {
      .bento-card:hover {
        transform: translateY(-4px) scale(1.01);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), inset 0 0 0 1px var(--card-color);
        background: rgba(30, 30, 30, 0.8);
      }
      .bento-card:hover::before {
        opacity: 1;
        background: linear-gradient(135deg, var(--card-color) 0%, transparent 100%);
      }
    }

    /* Touch: feedback discreto ao apertar, sem ficar "stuck" depois */
    @media (hover: none) {
      .bento-card:active {
        transform: scale(0.985);
        background: rgba(30, 30, 30, 0.7);
      }
    }

    @media (max-width: 768px) {
      .bento-card::before {
        box-sizing: border-box;
        padding: 0;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: none;
        -webkit-mask: none;
        mask: none;
        opacity: 1;
      }

      .bento-card:hover::before {
        border-color: color-mix(in srgb, var(--card-color) 50%, rgba(255, 255, 255, 0.12));
        background: none;
      }
    }

    /* Elementos Internos do Card */
    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 24px;
    }
    
    .icon-box {
      width: 50px;
      height: 50px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.05);
      color: var(--card-color);
      transition: all 0.4s ease;
      flex-shrink: 0;
    }
    .bento-card:hover .icon-box {
      background: var(--card-color);
      color: #000;
      transform: rotate(-10deg) scale(1.1);
      box-shadow: 0 0 20px var(--card-color);
    }
    .icon-box svg {
      width: 24px; height: 24px;
      stroke: currentColor;
      stroke-width: 2.5;
    }

    @media (max-width: 768px) {
      .icon-box {
        width: 40px;
        height: 40px;
        border-radius: 10px;
      }
      .icon-box svg {
        width: 20px;
        height: 20px;
      }
    }

    @media (max-width: 480px) {
      .icon-box {
        width: 36px;
        height: 36px;
        border-radius: 8px;
      }
      .icon-box svg {
        width: 18px;
        height: 18px;
      }
    }

    .badge {
      background: rgba(255,255,255,0.1);
      color: var(--card-color);
      font-size: 11px;
      font-weight: 800;
      padding: 6px 14px;
      border-radius: 30px;
      text-transform: uppercase;
      letter-spacing: 1px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .card-title {
      font-size: 20px;
      font-weight: 800;
      color: var(--text-main);
      margin-bottom: 12px;
      line-height: 1.1;
      text-transform: uppercase;
      letter-spacing: -0.5px;
    }
    .card-desc {
      font-size: 14px;
      font-weight: 400;
      color: var(--text-muted);
      line-height: 1.5;
    }

    @media (max-width: 768px) {
      .card-title {
        font-size: 16px;
        margin-bottom: 8px;
      }
      .card-desc {
        font-size: 12px;
        line-height: 1.4;
      }
    }

    @media (max-width: 480px) {
      .card-title {
        font-size: 14px;
        letter-spacing: 0px;
      }
      .card-desc {
        font-size: 11px;
      }
    }

    /* Especificidades Estilos do Bento Grid - Mantendo o Padrão de Tamanhos Diferentes */
    [data-id="gabinete"] { grid-column: span 2; grid-row: span 2; }
    [data-id="gabinete"] .card-title { font-size: 32px; margin-bottom: 20px; }
    [data-id="gabinete"] .icon-box { width: 70px; height: 70px; }
    [data-id="gabinete"] .icon-box svg { width: 34px; height: 34px; }
    [data-id="gabinete"] .card-desc { font-size: 16px; }

    /* Card destacado no mobile: mantém destaque mas com proporções confortáveis */
    @media (max-width: 768px) {
      [data-id="gabinete"] .card-title { font-size: 22px; margin-bottom: 12px; }
      [data-id="gabinete"] .icon-box { width: 54px; height: 54px; border-radius: 14px; }
      [data-id="gabinete"] .icon-box svg { width: 26px; height: 26px; }
      [data-id="gabinete"] .card-desc { font-size: 13px; }
    }
    @media (max-width: 480px) {
      [data-id="gabinete"] .card-title { font-size: 20px; }
      [data-id="gabinete"] .icon-box { width: 48px; height: 48px; border-radius: 12px; }
      [data-id="gabinete"] .icon-box svg { width: 22px; height: 22px; }
      [data-id="gabinete"] .card-desc { font-size: 12px; }
    }

    /* Defensivo: textos longos sem estourar card */
    .card-title, .card-desc,
    .lab-card-title, .lab-card-desc,
    .labs-title, .labs-desc,
    .header-text h1, .header-text p {
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .bento-card, .lab-card { min-width: 0; }

    [data-id="checklist"] { grid-column: span 2; }
    [data-id="corte"] { grid-column: span 2; }

    [data-id="comparador"] { grid-column: span 2; }
    [data-id="precos-vivo"] { grid-column: span 2; }
    [data-id="precificacao"] { grid-column: span 2; }
    [data-id="scraper"] { grid-column: span 2; }


    [data-id="cotacao"] { grid-column: span 1; }
    [data-id="extracao"] { grid-column: span 2; }
    [data-id="download"] { grid-column: span 1; }

    [data-id="scraper-labs"] { grid-column: span 2; }

    .labs-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 32px;
      background: rgba(2, 6, 23, 0.74);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .labs-overlay.is-open { display: flex; }

    .labs-panel {
      width: min(1040px, 100%);
      max-height: min(82vh, 780px);
      overflow: auto;
      padding: 32px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      background:
        radial-gradient(circle at top left, rgba(239, 68, 68, 0.16), transparent 32%),
        rgba(15, 15, 25, 0.97);
      box-shadow: 0 28px 90px rgba(0,0,0,0.55);
    }

    .labs-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 24px;
    }

    .labs-kicker {
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .labs-title {
      color: var(--text-main);
      font-size: 30px;
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .labs-desc {
      max-width: 620px;
      margin-top: 10px;
      color: var(--text-muted);
      font-size: 13px;
      line-height: 1.5;
      font-weight: 600;
    }

    .labs-close {
      flex: 0 0 auto;
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      color: var(--text-main);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .labs-close:hover {
      border-color: rgba(239, 68, 68, 0.65);
      color: #fff;
      background: rgba(239, 68, 68, 0.18);
    }

    .labs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    .lab-card {
      min-height: 158px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 18px;
      padding: 20px;
      color: var(--text-main);
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      background: rgba(255,255,255,0.045);
      transition: transform 0.22s ease, border-color 0.22s ease, background 0.22s ease;
    }

    @media (hover: hover) and (pointer: fine) {
      .lab-card:hover {
        transform: translateY(-3px);
        border-color: var(--lab-color);
        background: rgba(255,255,255,0.075);
      }
    }
    @media (hover: none) {
      .lab-card:active {
        transform: scale(0.985);
        background: rgba(255,255,255,0.085);
      }
    }

    .lab-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .lab-card-status {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 24px;
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: var(--text-muted);
      font-size: 9px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .lab-card-status.is-official {
      color: #00e676;
      background: rgba(0,230,118,0.12);
      border-color: rgba(0,230,118,0.42);
      box-shadow: 0 0 20px rgba(0,230,118,0.08);
    }

    .lab-card-status.is-lab {
      color: #f59e0b;
      background: rgba(245,158,11,0.1);
      border-color: rgba(245,158,11,0.35);
    }

    .lab-card .icon-box {
      width: 42px;
      height: 42px;
      color: var(--lab-color);
      background: color-mix(in srgb, var(--lab-color) 14%, transparent);
      border-color: color-mix(in srgb, var(--lab-color) 40%, transparent);
    }

    .lab-card .icon-box svg {
      width: 20px;
      height: 20px;
    }

    .lab-card-title {
      font-size: 15px;
      font-weight: 900;
      line-height: 1.28;
      text-transform: uppercase;
      letter-spacing: 0;
      margin-bottom: 8px;
    }

    .lab-card-desc {
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.45;
      font-weight: 600;
    }

    .lab-card-meta {
      color: var(--lab-color);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 1.2px;
      text-transform: uppercase;
    }

    .lab-card-badge {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 24px;
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: var(--lab-color);
      font-size: 9px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    @media (max-width: 768px) {
      .labs-overlay {
        padding: 12px;
        align-items: stretch;
        justify-content: stretch;
      }
      .labs-panel {
        padding: 20px 18px calc(20px + env(safe-area-inset-bottom));
        margin: 0;
        width: 100%;
        max-height: calc(100dvh - 24px);
        border-radius: 20px;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }
      .labs-head {
        position: sticky;
        top: -20px;
        margin: -20px -18px 16px;
        padding: 16px 18px 12px;
        background: rgba(15, 15, 25, 0.92);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        z-index: 2;
      }
      .labs-title { font-size: 22px; }
      .labs-desc { font-size: 12px; }
      .labs-close {
        width: 40px;
        height: 40px;
        border-radius: 12px;
      }
      .labs-grid { grid-template-columns: 1fr; gap: 12px; }
      .lab-card { min-height: auto; padding: 16px; }
    }

    @media (max-width: 480px) {
      .labs-overlay { padding: 8px; }
      .labs-panel { padding: 18px 14px calc(18px + env(safe-area-inset-bottom)); border-radius: 18px; }
      .labs-head { margin: -18px -14px 14px; padding: 14px 14px 10px; top: -18px; }
      .labs-title { font-size: 20px; }
    }

    /* Mobile: força todo card a ocupar a linha inteira (corrige cards estreitos) */
    @media (max-width: 768px) {
      .bento-grid > .bento-card {
        grid-column: 1 / -1 !important;
        grid-row: auto !important;
      }
    }

    /* Footer Meta Info */
    .meta-footer {
      margin-top: 80px;
      text-align: center;
      font-size: 16px;
      color: var(--text-muted);
      font-weight: 500;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    @media (max-width: 768px) {
      .meta-footer {
        margin-top: 50px;
        font-size: 14px;
      }
    }

    @media (max-width: 480px) {
      .meta-footer {
        margin-top: 40px;
        font-size: 12px;
      }
    }
    .status-dot {
      display: inline-block;
      width: 8px; height: 8px;
      background: #10b981;
      border-radius: 50%;
      margin-right: 6px;
      box-shadow: 0 0 10px #10b981;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
      70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
      100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }

    /* === TOOLTIP DO RODAPÉ === */
    .tooltip {
      position: relative;
      display: inline-block;
      cursor: help;
    }
    .tooltiptext {
      visibility: hidden;
      width: 380px;
      background-color: rgba(20, 20, 20, 0.95);
      color: var(--text-main);
      text-align: center;
      padding: 16px 20px;
      border-radius: 12px;
      border: 1px solid var(--card-border);
      position: absolute;
      z-index: 100;
      bottom: 140%;
      left: 50%;
      transform: translateX(-50%);
      opacity: 0;
      transition: all 0.3s ease;
      font-size: 13px;
      font-weight: 500;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
      pointer-events: none;
      backdrop-filter: blur(10px);
    }
    .tooltiptext strong {
      display: block;
      color: #4facfe;
      margin-bottom: 8px;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.5px;
    }
    .tooltip:hover .tooltiptext {
      visibility: visible;
      opacity: 1;
      bottom: 160%;
    }
    .tooltiptext::after {
      content: "";
      position: absolute;
      top: 100%;
      left: 50%;
      margin-left: -8px;
      border-width: 8px;
      border-style: solid;
      border-color: rgba(20, 20, 20, 0.95) transparent transparent transparent;
    }

    @media (max-width: 768px) {
      .tooltiptext {
        width: 300px;
        padding: 12px 16px;
        font-size: 12px;
      }
      .tooltiptext strong {
        font-size: 10px;
      }
    }

    @media (max-width: 480px) {
      .tooltiptext {
        width: 250px;
        padding: 10px 14px;

    async function loadLastUpdate() {
      try {
        // PRIORIDADE: Tenta usar o log dinâmico do Git (LATEST_LOG) se ele existir
        if (typeof LATEST_LOG !== 'undefined') {
           const latest = LATEST_LOG;
           const title = "Última Sincronização Git";
           const desc = latest.message;
           
           // Formata a data ISO do Git
           const dateObj = new Date(latest.dateIso);
           const dateStr = dateObj.toLocaleDateString('pt-BR');
           const timeStr = dateObj.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

           document.getElementById('update-title').textContent = title;
           document.getElementById('update-desc').textContent = desc;
           document.getElementById('update-datetime').innerHTML = `
             <div style="font-weight: 600; color: #4facfe; margin-bottom: 4px;">📅 ${dateStr}</div>
             <div style="font-weight: 700; color: #00e676;">⏰ ${timeStr}</div>
           `;
           console.log("Log dinâmico carregado:", latest);
           return;
        }

        // FALLBACK: Se o log dinâmico falhar, usa os dados estáticos abaixo
        const data = updatesData;
        if (data.updates && data.updates.length > 0) {
          const latest = data.updates[0];
          document.getElementById('update-title').textContent = latest.title;
          document.getElementById('update-desc').textContent = latest.description;
          document.getElementById('update-datetime').innerHTML = `
            <div style="font-weight: 600; color: #4facfe; margin-bottom: 4px;">📅 ${latest.date}</div>
            <div style="font-weight: 700; color: #00e676;">⏰ ${latest.time}</div>
          `;
        }
      } catch(e) {
        console.error('Erro ao carregar atualizações:', e);
      }
    }

    // loadLastUpdate é disparado pelo onload/onerror do logScript acima.
    // Mantém um fallback caso o DOM termine antes do script (ex: cache).
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof LATEST_LOG !== 'undefined') loadLastUpdate();
    });

  </script>
