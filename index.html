<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #06080b;
      --panel: rgba(15, 20, 27, .88);
      --panel-soft: rgba(255, 255, 255, .035);
      --card: #10161e;
      --card-hover: #141c26;
      --line: rgba(148, 163, 184, .14);
      --line-strong: rgba(148, 163, 184, .32);
      --text: #f7fafc;
      --soft: #cbd5e1;
      --muted: #8793a3;
      --blue: #38bdf8;
      --green: #22c55e;
      --orange: #f59e0b;
      --shadow: 0 24px 80px rgba(0, 0, 0, .36);
    }
    html { scroll-behavior: smooth; }
    body {
      min-height: 100vh;
      font-family: 'Outfit', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 8% 0%, rgba(56,189,248,.13), transparent 360px),
        radial-gradient(circle at 88% 10%, rgba(34,197,94,.08), transparent 320px),
        linear-gradient(180deg, #06080b 0%, #0a0d12 100%);
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -1;
      background-image: linear-gradient(rgba(255,255,255,.022) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.022) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,.86), transparent 78%);
      pointer-events: none;
    }
    a { color: inherit; text-decoration: none; }
    button, input { font: inherit; }
    button { cursor: pointer; }
    .container { width: min(1160px, calc(100% - 40px)); margin: 0 auto; padding: 26px 0 42px; }
    .topbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 18px; }
    .brand { display: flex; align-items: center; gap: 14px; min-width: 0; }
    .signature { display: inline-flex; align-items: center; gap: 10px; color: rgba(203,213,225,.78); font-size: 11px; font-weight: 900; letter-spacing: 2.6px; text-transform: uppercase; cursor: pointer; user-select: none; }
    .signature-mark { width: 8px; height: 8px; border-radius: 999px; background: var(--blue); box-shadow: 0 0 18px rgba(56,189,248,.45); }
    .brand-divider { width: 1px; height: 18px; background: var(--line); }
    h1 { font-size: clamp(30px, 5vw, 48px); line-height: .92; font-weight: 900; letter-spacing: -2.2px; }
    .quick-search-btn {
      min-height: 40px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,.045);
      color: var(--soft);
      font-size: 12px;
      font-weight: 850;
      white-space: nowrap;
      transition: .18s ease;
    }
    .quick-search-btn:hover { color: var(--text); border-color: rgba(56,189,248,.42); background: rgba(56,189,248,.10); transform: translateY(-1px); }
    .quick-search-btn svg, .command-search svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

    .command-panel {
      position: relative;
      z-index: 20;
      max-width: 1040px;
      margin: 0 auto 32px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(255,255,255,.058), rgba(255,255,255,.025));
      box-shadow: var(--shadow);
    }
    .command-search { position: relative; }
    .command-search svg { position: absolute; left: 17px; top: 50%; transform: translateY(-50%); color: rgba(203,213,225,.62); pointer-events: none; }
    .command-search input {
      width: 100%;
      height: 58px;
      padding: 0 18px 0 48px;
      border: 1px solid rgba(148,163,184,.18);
      border-radius: 18px;
      outline: none;
      background: rgba(4,7,12,.68);
      color: var(--text);
      font-size: 16px;
      font-weight: 750;
    }
    .command-search input::placeholder { color: rgba(135,147,163,.80); }
    .command-search input:focus { border-color: rgba(56,189,248,.55); box-shadow: 0 0 0 4px rgba(56,189,248,.10); }
    .search-dropdown {
      position: absolute;
      left: 12px;
      right: 12px;
      top: calc(100% - 4px);
      z-index: 30;
      display: none;
      overflow: hidden;
      border: 1px solid rgba(148,163,184,.24);
      border-radius: 18px;
      background: rgba(8,12,18,.98);
      box-shadow: 0 24px 70px rgba(0,0,0,.48);
    }
    .search-dropdown.is-open { display: block; }
    .search-result, .search-empty {
      width: 100%;
      display: grid;
      gap: 4px;
      padding: 14px 16px;
      border: 0;
      border-bottom: 1px solid rgba(148,163,184,.10);
      background: transparent;
      color: var(--text);
      text-align: left;
    }
    .search-result:last-child, .search-empty:last-child { border-bottom: 0; }
    .search-result:hover, .search-result.is-active { background: rgba(56,189,248,.10); }
    .result-name { display: flex; align-items: center; justify-content: space-between; gap: 12px; font-size: 14px; font-weight: 900; }
    .result-meta { color: var(--blue); font-size: 10px; font-weight: 900; letter-spacing: 1.1px; text-transform: uppercase; }
    .result-desc, .search-empty { color: var(--muted); font-size: 12px; font-weight: 650; line-height: 1.35; }

    .section { margin: 34px auto 0; }
    .section-head { width: min(100%, 828px); display: flex; align-items: center; justify-content: space-between; gap: 16px; margin: 0 auto 14px; }
    .section-title { font-size: 19px; font-weight: 900; letter-spacing: -.35px; }
    .section-count { color: rgba(135,147,163,.72); font-size: 11px; font-weight: 850; }
    .tool-grid {
      width: min(100%, 828px);
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 260px));
      grid-auto-rows: 260px;
      justify-content: center;
      gap: 16px;
    }
    .tool-card {
      position: relative;
      min-height: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 16px;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,.046), rgba(255,255,255,.020)), var(--card);
      color: var(--text);
      overflow: hidden;
      transition: .18s ease;
    }
    .tool-card::before { content: ''; position: absolute; inset: 0; border-top: 3px solid var(--card-color); opacity: .82; pointer-events: none; }
    .tool-card:hover { transform: translateY(-3px); border-color: color-mix(in srgb, var(--card-color) 52%, var(--line)); background: var(--card-hover); box-shadow: 0 22px 54px rgba(0,0,0,.30); }
    .tool-card.featured { grid-column: span 2; grid-row: span 2; padding: 28px; border-radius: 22px; background: linear-gradient(145deg, rgba(18,27,38,.98), rgba(12,18,26,.94)); }
    .tool-top { position: relative; z-index: 1; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .icon-box { width: 42px; height: 42px; display: grid; place-items: center; border-radius: 12px; color: var(--card-color); background: color-mix(in srgb, var(--card-color) 12%, transparent); border: 1px solid color-mix(in srgb, var(--card-color) 32%, transparent); }
    .tool-card.featured .icon-box { width: 54px; height: 54px; border-radius: 15px; }
    .icon-box svg { width: 21px; height: 21px; fill: none; stroke: currentColor; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
    .tool-card.featured .icon-box svg { width: 26px; height: 26px; }
    .tool-kind { color: var(--card-color); font-size: 10px; font-weight: 900; letter-spacing: 1.2px; text-transform: uppercase; text-align: right; }
    .tool-body { position: relative; z-index: 1; display: grid; gap: 9px; }
    .tool-name { font-size: 21px; line-height: 1.02; font-weight: 900; letter-spacing: -.65px; }
    .tool-card.featured .tool-name { font-size: clamp(34px, 4.4vw, 52px); letter-spacing: -2px; max-width: 560px; }
    .tool-short { max-width: 520px; max-height: 4.2em; overflow: hidden; color: var(--muted); font-size: 13px; font-weight: 700; line-height: 1.35; transition: opacity .16s ease, max-height .16s ease, margin .16s ease; }
    .tool-card.featured .tool-short { font-size: 15px; color: rgba(203,213,225,.72); }
    .tool-action { display: inline-flex; align-items: center; gap: 7px; width: max-content; color: var(--soft); font-size: 12px; font-weight: 900; }
    .tool-action::after { content: '→'; color: var(--card-color); }
    .detail-pop {
      position: static;
      z-index: 1;
      opacity: 0;
      max-height: 0;
      overflow: hidden;
      transform: none;
      pointer-events: none;
      color: var(--soft);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.38;
      transition: opacity .16s ease, max-height .16s ease, margin .16s ease;
    }
    .tool-card.featured .detail-pop { font-size: 14px; max-width: 540px; }
    .tool-card:hover .tool-short, .tool-card:focus-within .tool-short { opacity: 0; max-height: 0; margin: 0; }
    .tool-card:hover .detail-pop, .tool-card:focus-within .detail-pop { opacity: 1; max-height: 110px; margin-top: 2px; }

    .lab-grid {
      width: min(100%, 848px);
      grid-template-columns: repeat(4, minmax(0, 200px));
      grid-auto-rows: 200px;
      gap: 12px;
    }
    .lab-card { min-height: 200px; padding: 16px; border-radius: 16px; }
    .lab-card .tool-name { font-size: 16px; line-height: 1.06; letter-spacing: -.25px; }
    .lab-card .tool-short { font-size: 11.5px; line-height: 1.35; max-height: 3.1em; }
    .lab-card .tool-action { margin-top: 2px; }
    .lab-card .icon-box { width: 34px; height: 34px; border-radius: 10px; }
    .lab-card .icon-box svg { width: 18px; height: 18px; }
    .lab-card .detail-pop { font-size: 11.5px; max-height: 0; }

    .overlay, .quick-search-modal { position: fixed; inset: 0; z-index: 1000; display: none; align-items: center; justify-content: center; padding: 24px; background: rgba(3,6,10,.78); backdrop-filter: blur(16px); }
    .overlay.is-open, .quick-search-modal.active { display: flex; }
    .panel-modal, .quick-search-content { width: min(980px, 100%); max-height: min(86vh, 780px); overflow: auto; border: 1px solid var(--line-strong); border-radius: 26px; background: #0f141b; box-shadow: 0 32px 110px rgba(0,0,0,.55); }
    .panel-modal { padding: 26px; }
    .modal-head { display: flex; justify-content: space-between; gap: 18px; margin-bottom: 18px; }
    .modal-title { font-size: 26px; font-weight: 900; letter-spacing: -.8px; }
    .modal-desc { margin-top: 8px; color: var(--muted); font-size: 13px; font-weight: 650; }
    .close-btn, .quick-search-close { width: 42px; height: 42px; display: grid; place-items: center; border: 1px solid var(--line); border-radius: 14px; background: rgba(255,255,255,.05); color: var(--text); font-size: 22px; flex: 0 0 auto; }
    .hidden-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: 12px; }
    .quick-search-content { position: relative; height: min(86vh, 760px); overflow: hidden; }
    .quick-search-close { position: absolute; top: 14px; right: 14px; z-index: 2; border-radius: 50%; background: rgba(255,255,255,.08); }
    .quick-search-content iframe { width: 100%; height: 100%; border: 0; background: #0b0d10; }

    .meta-footer { margin-top: 38px; padding-top: 14px; border-top: 1px solid rgba(148,163,184,.10); display: flex; align-items: center; justify-content: space-between; gap: 18px; color: rgba(139,150,165,.78); }
    .status-line { display: flex; align-items: center; gap: 7px; color: rgba(203,213,225,.72); font-size: 12px; font-weight: 800; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(34,197,94,.82); box-shadow: 0 0 0 5px rgba(34,197,94,.08); }
    .footer-small { margin-top: 4px; color: rgba(139,150,165,.62); font-size: 11px; font-weight: 600; line-height: 1.35; }
    .update-hover { position: relative; display: inline-flex; flex-direction: column; align-items: flex-end; }
    #update-title { position: absolute; right: 0; bottom: calc(100% + 6px); opacity: 0; visibility: hidden; transform: translateY(3px); padding: 6px 8px; border: 1px solid rgba(148,163,184,.14); border-radius: 8px; background: rgba(15,20,27,.94); color: rgba(203,213,225,.82); font-size: 10px; font-weight: 700; white-space: nowrap; transition: .14s ease; }
    .update-hover:hover #update-title, .update-hover:focus-within #update-title { opacity: 1; visibility: visible; transform: translateY(0); }
    #update-datetime { margin-top: 4px; color: rgba(139,150,165,.58); font-size: 10px; font-weight: 700; cursor: help; }

    @media (max-width: 980px) {
      .tool-grid { width: min(100%, 536px); grid-template-columns: repeat(2, minmax(0, 260px)); grid-auto-rows: 250px; }
      .tool-card.featured { grid-column: span 2; grid-row: span 1; }
      .lab-grid { width: min(100%, 536px); grid-template-columns: repeat(2, minmax(0, 260px)); grid-auto-rows: 200px; }
      .section-head { width: min(100%, 536px); }
      .topbar { align-items: flex-start; }
      .brand { flex-direction: column; align-items: flex-start; gap: 6px; }
      .brand-divider { display: none; }
    }
    @media (max-width: 680px) {
      .container { width: min(100% - 28px, 1160px); padding: 22px 0 34px; }
      .topbar { flex-direction: column; }
      .quick-search-btn { width: 100%; justify-content: center; }
      .command-panel { border-radius: 20px; padding: 9px; }
      .command-search input { height: 54px; font-size: 16px; }
      .search-dropdown { left: 9px; right: 9px; }
      .section-head { align-items: flex-start; flex-direction: column; gap: 4px; }
      .tool-grid, .lab-grid { width: 100%; grid-template-columns: 1fr; grid-auto-rows: auto; }
      .tool-card, .tool-card.featured, .lab-card { grid-column: span 1; grid-row: span 1; min-height: 220px; aspect-ratio: auto; }
      .tool-card.featured .tool-name { font-size: clamp(32px, 11vw, 44px); }
      .detail-pop { display: none; }
      .tool-card:hover .tool-short, .tool-card:focus-within .tool-short { opacity: 1; max-height: none; }
      .overlay, .quick-search-modal { padding: 10px; align-items: stretch; }
      .panel-modal { padding: 20px 16px; border-radius: 20px; max-height: calc(100dvh - 20px); }
      .quick-search-content { height: calc(100dvh - 20px); border-radius: 20px; }
      .meta-footer { align-items: flex-start; flex-direction: column; }
      .update-hover { align-items: flex-start; }
      #update-title { left: 0; right: auto; }
    }
  </style>

</head>

      { nome: 'Scraper Leveros', short: 'Busca direta na Leveros.', detail: 'Abre o scraper individual da Leveros para consulta e teste da loja.', arquivo: 'scraper-leveros.html', color: '#fb923c', loja: 'Leveros', aliases: 'leveros' },
      { nome: 'Scraper Central Ar', short: 'Busca direta na Central Ar.', detail: 'Abre o scraper individual da Central Ar para consulta e teste da loja.', arquivo: 'scraper-centralar.html', color: '#ec4899', loja: 'Central Ar', aliases: 'central ar centralar' },
      { nome: 'Scraper FrioPeças', short: 'Busca direta na FrioPeças.', detail: 'Abre o scraper individual da FrioPeças para consulta e teste da loja.', arquivo: 'scraper-friopecas.html', color: '#60a5fa', loja: 'FrioPeças', aliases: 'friopecas frio peças friopecas' },
      { nome: 'Scraper Polo Ar', short: 'Busca direta na Polo Ar.', detail: 'Abre o scraper individual da Polo Ar para consulta e teste da loja.', arquivo: 'scraper-poloar.html', color: '#ef4444', loja: 'Polo Ar', aliases: 'polo ar poloar' },
      { nome: 'Scraper WebContinental', short: 'Busca direta na WebContinental.', detail: 'Abre o scraper individual da WebContinental para consulta e teste da loja.', arquivo: 'scraper-webcontinental.html', color: '#14b8a6', loja: 'WebContinental', aliases: 'webcontinental web continental' }
    ];

    const ferramentas = [
      { nome: 'Scraper Ar Condicionado', categoria: 'Ar-condicionado', short: 'Busca geral de ar-condicionado.', detail: 'Pesquisa preços nas lojas monitoradas e organiza resultados para comparação comercial.', arquivo: 'scraper-ar.html', icone: svgScraper, color: '#f59e0b', slug: 'scraper', category: 'ar', featured: true, aliases: 'scraper oficial ar condicionado split inverter preço busca mercado lojas' },
      { nome: 'Comparador de preços', categoria: 'Ar-condicionado', short: 'Compara ofertas entre lojas.', detail: 'Mostra referências por loja para ajudar a entender preço, disponibilidade e oportunidade.', arquivo: 'comparador-ar.html', icone: svgComparar, color: '#818cf8', slug: 'comparador', category: 'ar', aliases: 'comparar comparação ofertas lojas ar condicionado' },
      { nome: 'Precificação', categoria: 'Site x 365', short: 'Calcula Site x 365.', detail: 'Ajusta valores entre site e Dynamics 365 com cálculo proporcional por SKU.', arquivo: 'precificacao-ar.html', icone: svgPrecificar, color: '#0ea5e9', slug: 'precificacao', category: 'ar', aliases: 'preço precificar sku 365 site dynamics' },
      { nome: 'Simulador 3D', categoria: 'Câmara fria', short: 'Monta câmara fria.', detail: 'Visualiza o gabinete e gera apoio de cálculo de painéis para orçamento.', arquivo: 'simulador-gabinete.html', icone: svgBox3D, color: '#38bdf8', slug: 'gabinete', category: 'camara', aliases: 'camara fria gabinete simulador 3d painel' },
      { nome: 'Plano de corte', categoria: 'Câmara fria', short: 'Otimiza painéis.', detail: 'Organiza o aproveitamento de painéis PIR/EPS para reduzir sobra no orçamento.', arquivo: 'plano-corte.html', icone: svgCorte, color: '#f97316', slug: 'corte', category: 'camara', aliases: 'corte painel pir eps camara fria' },
      { nome: 'Checklist em PDF', categoria: 'Câmara fria', short: 'Gera PDF técnico.', detail: 'Padroniza levantamento de dados e gera checklist técnico para orçamento de câmara fria.', arquivo: 'CheckList.html', icone: svgChecklist, color: '#22c55e', slug: 'checklist', category: 'camara', aliases: 'check list pdf técnico orçamento câmara fria' },
      { nome: 'Extrator de Códigos', categoria: 'Utilitário', short: 'Extrai códigos e estoque.', detail: 'Cole uma lista e extraia códigos com quantidade em estoque.', arquivo: 'itens-quantidade.html', icone: svgFiltro, color: '#d946ef', slug: 'extracao', category: 'hidden' },
      { nome: 'Preços ao Vivo', categoria: 'Extensão', short: 'Ofertas capturadas.', detail: 'Visualize ofertas capturadas pela extensão nas abas abertas.', arquivo: 'precos-ao-vivo.html', icone: '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><path d="M12 6v6l4 2"></path></svg>', color: '#22c55e', slug: 'precos-vivo', category: 'hidden' },
      { nome: 'Cotação Express', categoria: 'Infraestrutura', short: 'Orçamento rápido.', detail: 'Gere orçamentos rápidos de infraestrutura para instalação.', arquivo: 'cotacoes.html', icone: svgCotar, color: '#a78bfa', slug: 'cotacao', category: 'hidden' },
      { nome: 'Baixar Extensão', categoria: 'Sistema', short: 'Instalar extensão.', detail: 'Baixe a extensão do Hub para instalar no Chrome ou Edge.', arquivo: 'baixar-extensao.html', icone: svgDownload, color: '#94a3b8', slug: 'download', category: 'hidden' }
    ];

    function normalizeText(value) {
      return String(value || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
    }

    function openToolItem(item) {
      if (!item) return;
      window.location.href = item.arquivo;
    }

    function createCard(item, extraClass = '') {
      const card = document.createElement('a');
      card.className = `tool-card ${item.featured ? 'featured' : ''} ${extraClass}`.trim();
      card.href = item.arquivo;
      card.style.setProperty('--card-color', item.color);
      card.title = item.detail;
      card.innerHTML = `
        <div class="tool-top">
          <div class="icon-box">${item.icone || svgScraper}</div>
          <span class="tool-kind">${item.categoria || item.loja || 'Ferramenta'}</span>
        </div>
        <div class="tool-body">
          <div class="tool-name">${item.nome}</div>
          <p class="tool-short">${item.short}</p>
          <div class="detail-pop">${item.detail}</div>
          <span class="tool-action">Abrir</span>
        </div>
      `;
      return card;
    }

    function renderCards() {
      const gridAr = document.getElementById('gridAr');
      const gridCamara = document.getElementById('gridCamara');
      const gridLabs = document.getElementById('gridLabs');
      ferramentas.filter(item => item.category === 'ar').forEach(item => gridAr.appendChild(createCard(item)));
      ferramentas.filter(item => item.category === 'camara').forEach(item => gridCamara.appendChild(createCard(item)));
      SCRAPER_LABS.forEach(item => gridLabs.appendChild(createCard({ ...item, categoria: item.loja, icone: svgScraper }, 'lab-card')));
    }

    function getSearchItems() {
      const visibleTools = ferramentas.filter(item => item.category !== 'hidden').map(item => ({ ...item, type: 'Ferramenta' }));
      const labTools = SCRAPER_LABS.map(item => ({ ...item, categoria: 'Scraper de loja', icone: svgScraper, type: item.loja }));
      return [...visibleTools, ...labTools].map(item => ({
        ...item,
        searchText: normalizeText(`${item.nome} ${item.categoria} ${item.short} ${item.detail} ${item.loja || ''} ${item.aliases || ''}`)
      }));
    }

    function setupSearch() {
      const input = document.getElementById('toolSearchInput');
      const dropdown = document.getElementById('searchDropdown');
      const items = getSearchItems();
      let activeIndex = -1;
      let currentResults = [];

      function closeDropdown() {
        dropdown.classList.remove('is-open');
        input.setAttribute('aria-expanded', 'false');
        activeIndex = -1;
      }

      function renderResults() {
        const term = normalizeText(input.value.trim());
        dropdown.innerHTML = '';
        activeIndex = -1;
        if (!term) return closeDropdown();

        currentResults = items.filter(item => item.searchText.includes(term)).slice(0, 5);
        dropdown.classList.add('is-open');
        input.setAttribute('aria-expanded', 'true');

        if (!currentResults.length) {
          dropdown.innerHTML = '<div class="search-empty">Não encontrei. Tente buscar por loja, ferramenta ou categoria.</div>';
          return;
        }

        currentResults.forEach((item, index) => {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'search-result';
          button.setAttribute('role', 'option');
          button.innerHTML = `<span class="result-name"><span>${item.nome}</span><span class="result-meta">${item.type || item.categoria}</span></span><span class="result-desc">${item.short}</span>`;
          button.addEventListener('mouseenter', () => setActive(index));
          button.addEventListener('click', () => openToolItem(item));
          dropdown.appendChild(button);
        });
      }

      function setActive(index) {
        const buttons = dropdown.querySelectorAll('.search-result');
        buttons.forEach(button => button.classList.remove('is-active'));
        activeIndex = index;
        buttons[index]?.classList.add('is-active');
      }

      input.addEventListener('input', renderResults);
      input.addEventListener('focus', renderResults);
      input.addEventListener('keydown', event => {
        if (!dropdown.classList.contains('is-open')) return;
        if (event.key === 'Escape') { closeDropdown(); return; }
        if (!currentResults.length) return;
        if (event.key === 'ArrowDown') { event.preventDefault(); setActive((activeIndex + 1) % currentResults.length); }
        if (event.key === 'ArrowUp') { event.preventDefault(); setActive((activeIndex - 1 + currentResults.length) % currentResults.length); }
        if (event.key === 'Enter') { event.preventDefault(); openToolItem(currentResults[Math.max(activeIndex, 0)]); }
      });
      document.addEventListener('click', event => { if (!event.target.closest('.command-panel')) closeDropdown(); });
    }

    function createHiddenToolsPanel() {
      const hiddenTools = ferramentas.filter(tool => tool.category === 'hidden');
      const overlay = document.createElement('div');
      overlay.id = 'hiddenToolsOverlay';
      overlay.className = 'overlay';
      overlay.innerHTML = `<div class="panel-modal"><div class="modal-head"><div><div class="modal-title">Ferramentas internas</div><div class="modal-desc">Recursos ocultos da tela principal.</div></div><button class="close-btn" type="button" data-close-hidden-tools>&times;</button></div><div class="hidden-grid">${hiddenTools.map(tool => `<a class="tool-card lab-card" href="${tool.arquivo}" style="--card-color:${tool.color}"><div class="tool-top"><div class="icon-box">${tool.icone}</div><span class="tool-kind">${tool.categoria}</span></div><div class="tool-body"><div class="tool-name">${tool.nome}</div><p class="tool-short">${tool.short}</p><div class="detail-pop">${tool.detail}</div><span class="tool-action">Abrir</span></div></a>`).join('')}</div></div>`;
      overlay.addEventListener('click', event => { if (event.target === overlay || event.target.closest('[data-close-hidden-tools]')) closePanel('hiddenToolsOverlay'); });
      document.body.appendChild(overlay);
      return overlay;
    }

    function openHiddenToolsPanel() {
      const panel = document.getElementById('hiddenToolsOverlay') || createHiddenToolsPanel();
      panel.classList.add('is-open');
      document.body.style.overflow = 'hidden';
    }

    function closePanel(id) {
      const panel = document.getElementById(id);
      if (!panel) return;
      panel.classList.remove('is-open', 'active');
      document.body.style.overflow = '';
    }

    function setupSecretAccess() {
      const signature = document.getElementById('thiagoLogo');
      let clicks = [];
      signature?.addEventListener('click', () => {
        const now = Date.now();
        clicks = clicks.filter(time => now - time <= 2000);
        clicks.push(now);
        if (clicks.length >= 3) { clicks = []; openHiddenToolsPanel(); }
      });
    }

    function setupQuickSearch() {
      const modal = document.getElementById('quickSearchModal');
      const iframe = document.getElementById('quickSearchIframe');
      const openBtn = document.getElementById('quickSearchBtn');
      const closeBtn = document.getElementById('closeQuickSearchBtn');
      openBtn?.addEventListener('click', () => {
        iframe.src = 'scraper-dufrio.html';
        modal.classList.add('active');
        document.body.style.overflow = 'hidden';
      });
      closeBtn?.addEventListener('click', () => closePanel('quickSearchModal'));
      modal?.addEventListener('click', event => { if (event.target === modal) closePanel('quickSearchModal'); });
    }

    function renderLastUpdate() {
      const dateEl = document.getElementById('update-datetime');
      const titleEl = document.getElementById('update-title');
      const latest = updatesData.updates[0];
      let title = latest.title;
      let datetime = `${latest.date} às ${latest.time}`;

      if (typeof LATEST_LOG !== 'undefined' && LATEST_LOG?.message && LATEST_LOG?.dateIso) {
        const parsed = new Date(LATEST_LOG.dateIso);
        if (!Number.isNaN(parsed.getTime())) {
          const date = parsed.toLocaleDateString('pt-BR', { timeZone: 'America/Sao_Paulo' });
          const time = parsed.toLocaleTimeString('pt-BR', { timeZone: 'America/Sao_Paulo', hour: '2-digit', minute: '2-digit' });
          datetime = `${date} às ${time}`;
          title = LATEST_LOG.message;
        }
      }

      dateEl.textContent = datetime;
      titleEl.textContent = title;
    }

    document.addEventListener('keydown', event => {
      if (event.key === 'Escape') {
        closePanel('hiddenToolsOverlay');
        closePanel('quickSearchModal');
      }
    });

    renderCards();
    setupSearch();
    setupSecretAccess();
    setupQuickSearch();
    renderLastUpdate();
  </script>
