<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Scraper FrioPeças</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:,">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #050505;
      --card-bg: rgba(18, 18, 28, 0.9);
      --card-border: rgba(255, 255, 255, 0.08);
      --accent: #2563eb;
      --accent-rgb: 37, 99, 235;
      --green: #00e676;
      --text: #ffffff;
      --muted: #7a7a9a;
      --radius: 24px;
    }
    body { font-family: "Outfit", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    .aurora { position: fixed; border-radius: 50%; filter: blur(130px); z-index: 0; pointer-events: none; opacity: 0.15; animation: auroraAnim 20s infinite alternate ease-in-out; }
    .a1 { width: 800px; height: 800px; background: #2563eb; top: -20%; left: -10%; }
    .a2 { width: 700px; height: 700px; background: #06b6d4; bottom: -20%; right: -10%; animation-duration: 30s; }
    @keyframes auroraAnim { 0% { transform: scale(1) translate(0,0); } 100% { transform: scale(1.3) translate(100px,-100px); } }
    .btn-back { position: fixed; top: 20px; left: 20px; z-index: 1000; background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 10px 20px; border-radius: 40px; text-decoration: none; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 10px; transition: 0.3s; }
    .btn-back:hover { background: rgba(255,255,255,0.15); transform: translateX(-5px); }
    .container { position: relative; z-index: 1; max-width: 1300px; margin: 0 auto; padding: 100px 24px 120px; }
    .header-area { text-align: center; margin-bottom: 40px; }
    .header-area h1 { font-size: 48px; font-weight: 900; letter-spacing: -2px; text-transform: uppercase; font-style: italic; background: linear-gradient(135deg, #2563eb, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 12px; }
    .header-area p { font-size: 14px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 3px; }
    .lab-tag { display: inline-block; background: rgba(var(--accent-rgb), 0.15); border: 1px solid rgba(var(--accent-rgb), 0.4); color: var(--accent); padding: 6px 14px; border-radius: 30px; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 18px; }

    .step-section { display: none; flex-direction: column; align-items: center; gap: 18px; animation: slideUp 0.5s cubic-bezier(0.22,1,0.36,1) forwards; margin-bottom: 32px; }
    .step-section.active { display: flex; }
    .step-section h2 { font-size: 14px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 3px; }
    .options-grid { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
    .option-btn { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid var(--card-border); padding: 14px 28px; border-radius: 12px; cursor: pointer; transition: all 0.2s; color: var(--text); font-weight: 800; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; font-family: "Outfit", sans-serif; }
    .option-btn:hover { border-color: var(--accent); background: rgba(var(--accent-rgb), 0.08); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(var(--accent-rgb), 0.1); }
    .option-btn.selected { background: rgba(var(--accent-rgb), 0.15); border-color: var(--accent); box-shadow: 0 0 20px rgba(var(--accent-rgb), 0.25); color: #fff; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }

    .search-box { background: var(--card-bg); border: 1px solid var(--card-border); padding: 40px; border-radius: var(--radius); backdrop-filter: blur(30px); margin-bottom: 50px; display: flex; flex-direction: column; gap: 20px; box-shadow: 0 30px 60px rgba(0,0,0,0.4); opacity: 0.55; pointer-events: none; transition: opacity 0.4s ease; }
    .search-box.ready { opacity: 1; pointer-events: auto; }
    .input-group { position: relative; }
    .input-label { font-size: 11px; color: var(--muted); font-weight: 800; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; display: block; }
    .url-input { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--card-border); padding: 20px 24px; border-radius: 16px; color: #fff; font-family: inherit; font-size: 14px; outline: none; transition: 0.3s; }
    .url-input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(var(--accent-rgb), 0.1); }
    .source-tag { font-size: 10px; color: var(--accent); font-weight: 800; text-transform: uppercase; letter-spacing: 2px; margin-top: 8px; display: block; }
    .link-actions { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
    .btn-link-action { flex: 1; min-width: 140px; background: rgba(255,255,255,0.05); border: 1px solid var(--card-border); color: #fff; padding: 12px 16px; border-radius: 12px; font-family: inherit; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; cursor: pointer; text-align: center; text-decoration: none; transition: 0.3s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-link-action:hover { background: rgba(255,255,255,0.1); border-color: var(--accent); color: var(--accent); }
    .btn-link-action.copied { background: rgba(0,230,118,0.15); border-color: rgba(0,230,118,0.5); color: var(--green); }
    .btn-link-action[disabled], .btn-link-action[aria-disabled="true"] { opacity: 0.35; pointer-events: none; }
    .btn-action { background: var(--accent); color: #fff; border: none; padding: 20px; border-radius: 16px; font-weight: 900; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: 0.4s; display: flex; align-items: center; justify-content: center; gap: 12px; }
    .btn-action:hover { background: #1d4ed8; transform: translateY(-3px); box-shadow: 0 15px 30px rgba(var(--accent-rgb), 0.3); }
    .btn-action:disabled { background: #333; color: #666; cursor: not-allowed; transform: none; }

    .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
    .card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: var(--radius); overflow: hidden; backdrop-filter: blur(20px); display: flex; flex-direction: column; transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
    .card:hover { transform: translateY(-8px) scale(1.02); border-color: rgba(var(--accent-rgb), 0.4); box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
    .card-img { width: 100%; aspect-ratio: 1; background: #fff; display: flex; align-items: center; justify-content: center; padding: 30px; position: relative; border-bottom: 1px solid var(--card-border); }
    .card-img img { max-width: 100%; max-height: 100%; object-fit: contain; transition: 0.5s; }
    .card:hover .card-img img { transform: scale(1.1); }
    .card-body { padding: 24px; flex: 1; display: flex; flex-direction: column; }
    .card-title { font-size: 16px; font-weight: 700; line-height: 1.5; color: #fff; margin-bottom: 20px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; height: 72px; }
    .price-box { margin-top: auto; background: rgba(255,255,255,0.03); padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); }
    .price-cash { font-size: 26px; font-weight: 900; color: var(--green); letter-spacing: -1px; }
    .price-label { font-size: 11px; color: var(--green); text-transform: uppercase; font-weight: 800; margin-left: 4px; }
    .price-parc { font-size: 13px; color: var(--muted); font-weight: 600; margin-top: 6px; }
    .card-btn { display: block; width: 100%; padding: 14px; background: rgba(255,255,255,0.06); border: 1px solid var(--card-border); border-radius: 12px; color: #fff; text-decoration: none; text-align: center; font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 18px; transition: 0.3s; }
    .card-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

    .loading-area { display: none; text-align: center; padding: 60px; }
    .spin { width: 50px; height: 50px; border: 5px solid rgba(var(--accent-rgb), 0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 25px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .msg { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 16px; font-weight: 600; }

    .sync-status { position: fixed; bottom: 20px; right: 20px; z-index: 1000; background: rgba(18,18,28,0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); padding: 10px 18px; border-radius: 30px; display: flex; align-items: center; gap: 10px; font-size: 10px; font-weight: 800; color: #fff; text-transform: uppercase; letter-spacing: 1.5px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); transition: all 0.4s ease; }
    .sync-dot { width: 8px; height: 8px; border-radius: 50%; }
    .sync-status.loading .sync-dot { background: #f59e0b; box-shadow: 0 0 10px #f59e0b; animation: pulse-dot 1s infinite alternate; }
    .sync-status.success .sync-dot { background: #00e676; box-shadow: 0 0 10px #00e676; }
    .sync-status.error .sync-dot { background: #ff5252; box-shadow: 0 0 10px #ff5252; }
    @keyframes pulse-dot { from { opacity: 0.4; transform: scale(0.8); } to { opacity: 1; transform: scale(1.2); } }
  </style>
	<script src="analytics.js" defer></script>
</head>
<body>

  <div id="sync-status" class="sync-status loading">
    <div class="sync-dot"></div>
    <span id="sync-text">Conectando</span>
  </div>

  <div class="aurora a1"></div>
  <div class="aurora a2"></div>

  <a href="index.html" class="btn-back">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Voltar ao Hub
  </a>

  <div class="container">
    <div class="header-area">
      <span class="lab-tag">Laboratório</span>
      <h1>Scraper FrioPeças</h1>
      <p>Teste individual do scraper da FrioPeças.</p>
    </div>

    <div id="step-tipo" class="step-section active">
      <h2>Selecione o Tipo</h2>
      <div class="options-grid" id="tipo-options"></div>
    </div>
    <div id="step-btus" class="step-section">
      <h2>Selecione os BTUs</h2>
      <div class="options-grid" id="btu-options"></div>
    </div>
    <div id="step-ciclo" class="step-section">
      <h2>Selecione o Ciclo</h2>
      <div class="options-grid" id="ciclo-options"></div>
    </div>

    <div id="search-box" class="search-box">
      <div class="input-group">
        <span class="input-label">Link da FrioPeças (vindo da planilha)</span>
        <input type="text" id="urlInput" class="url-input" placeholder="Selecione tipo, BTU e ciclo acima…">
        <span id="sourceTag" class="source-tag">Aguardando seleção…</span>
        <div class="link-actions">
          <button type="button" id="copyBtn" class="btn-link-action" disabled>📋 Copiar link</button>
          <a id="openBtn" class="btn-link-action" target="_blank" rel="noopener" aria-disabled="true">↗ Abrir no site</a>
        </div>
      </div>
      <button id="renderBtn" class="btn-action" disabled>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
        Renderizar Ofertas
      </button>
    </div>

    <div id="loader" class="loading-area">
      <div class="spin"></div>
      <p style="text-transform: uppercase; letter-spacing: 2px; font-size: 12px; color: var(--accent); font-weight: 800;">Consultando inventário FrioPeças…</p>
    </div>

    <div id="results" class="results-grid"></div>
    <div id="status" class="msg"></div>
  </div>

  <script>
    // ============================================================
    // CONFIG DA LOJA
    // ============================================================
    const STORE = {
      slug: "friopecas",
      label: "FrioPeças",
      sheetMatch: "friopec",
      baseUrl:  "https://www.friopecas.com.br"
    };

    const SHEET_URL = "https://opensheet.elk.sh/1ml7XpwZfzM4ElRJb4G62b93VMqUw3jeprTtgxdigiD8/Sheet1";
    const CACHE_KEY = "scraper_sheet_data_v1";

    const PROXIES = [
      "https://api.codetabs.com/v1/proxy?quest=",
      "https://api.allorigins.win/get?url=",
      "https://frigelar-proxy.crftwo.workers.dev/?url="
    ];

    // ------------------------------------------------------------
    // Estado
    // ------------------------------------------------------------
    let sheetData = [];
    let selection = { tipo: "", btu: "", ciclo: "" };
    let sheetLoadPromise = null;

    // Helpers exatamente iguais ao scraper-ar.html
    const norm = (s) => String(s || "")
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .toLowerCase()
      .replace(/[\s\-_.]/g, "");
    const normalizeCiclo = (c) => String(c || "")
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .toLowerCase()
      .trim()
      .replace(/^so\s+/, "");
    const sortBTUs = (a, b) => {
      const getVal = (s) => parseInt(String(s).replace(/[.,]/g, "").match(/\d+/) || [0], 10);
      return getVal(a) - getVal(b);
    };
    const formatBTU = (btu) => String(btu).replace(/\b(\d+)\b/g, m => m.length >= 4 ? m.replace(/\B(?=(\d{3})+(?!\d))/g, ".") : m);
    const formatCiclo = (ciclo) => String(ciclo).toLowerCase().trim() === "frio" ? "Só Frio" : ciclo;

    // ------------------------------------------------------------
    // Carrega planilha (cache + fetch em background, igual ao Oficial)
    // ------------------------------------------------------------
    async function loadData() {
      const syncStatus = document.getElementById("sync-status");
      const syncText = document.getElementById("sync-text");

      const cached = localStorage.getItem(CACHE_KEY);
      if (cached) {
        try { sheetData = JSON.parse(cached); } catch(e) {}
        if (sheetData.length) renderTipos();
      }

      sheetLoadPromise = (async () => {
        try {
          const r = await fetch(SHEET_URL);
          const fresh = await r.json();
          if (JSON.stringify(sheetData) !== JSON.stringify(fresh)) {
            sheetData = fresh;
            localStorage.setItem(CACHE_KEY, JSON.stringify(sheetData));
            renderTipos();
          }
          syncStatus.className = "sync-status success";
          syncText.innerText = "Conectado";
        } catch(e) {
          console.error("Erro ao carregar planilha", e);
          syncStatus.className = "sync-status error";
          syncText.innerText = "Falha na planilha";
        }
      })();

      if (!sheetData.length) await sheetLoadPromise;
      if (sheetData.length) renderTipos();
    }

    // ------------------------------------------------------------
    // Step Tipo: só mostra Tipos que essa loja TEM na planilha
    // ------------------------------------------------------------
    function getStoreRows() {
      return sheetData.filter(i => i && i.Site && norm(i.Site).includes(STORE.sheetMatch));
    }

    function renderTipos() {
      const c = document.getElementById("tipo-options"); c.innerHTML = "";
      const rows = getStoreRows();
      const tipos = [...new Set(rows.map(i => i.Tipo).filter(Boolean))];
      if (tipos.length === 0) {
        c.innerHTML = `<div class="msg">Nenhum tipo cadastrado para ${STORE.label} na planilha.</div>`;
        return;
      }
      tipos.forEach(t => {
        const b = document.createElement("button");
        b.className = "option-btn" + (selection.tipo === t ? " selected" : "");
        b.innerText = t;
        b.onclick = () => selectTipo(t);
        c.appendChild(b);
      });
    }

    function renderOptions(id, opts, cb, current, formatter) {
      const c = document.getElementById(id); c.innerHTML = "";
      opts.forEach(o => {
        const b = document.createElement("button");
        b.className = "option-btn" + (current === o ? " selected" : "");
        b.innerText = formatter ? formatter(o) : o;
        b.onclick = () => cb(o);
        c.appendChild(b);
      });
    }

    function selectTipo(t) {
      selection.tipo = t;
      selection.btu = "";
      selection.ciclo = "";
      renderTipos();
      const rows = getStoreRows().filter(i => i.Tipo === t);
      const btus = [...new Set(rows.map(i => i.BTUs))].sort(sortBTUs);
      renderOptions("btu-options", btus, selectBTU, selection.btu, formatBTU);
      document.getElementById("step-btus").classList.add("active");
      document.getElementById("step-ciclo").classList.remove("active");
      resetReady();
      setTimeout(() => document.getElementById("step-btus").scrollIntoView({behavior: 'smooth', block: 'center'}), 80);
    }

    function selectBTU(b) {
      selection.btu = b;
      selection.ciclo = "";
      const rows = getStoreRows().filter(i => i.Tipo === selection.tipo);
      const btus = [...new Set(rows.map(i => i.BTUs))].sort(sortBTUs);
      renderOptions("btu-options", btus, selectBTU, selection.btu, formatBTU);
      const ciclos = [...new Set(getStoreRows().filter(i => i.Tipo === selection.tipo && i.BTUs === b).map(i => i.Ciclo))];
      renderOptions("ciclo-options", ciclos, selectCiclo, selection.ciclo, formatCiclo);
      document.getElementById("step-ciclo").classList.add("active");
      resetReady();
      setTimeout(() => document.getElementById("step-ciclo").scrollIntoView({behavior: 'smooth', block: 'center'}), 80);
    }

    function selectCiclo(c) {
      selection.ciclo = c;
      const ciclos = [...new Set(getStoreRows().filter(i => i.Tipo === selection.tipo && i.BTUs === selection.btu).map(i => i.Ciclo))];
      renderOptions("ciclo-options", ciclos, selectCiclo, selection.ciclo, formatCiclo);
      findStoreLink();
    }

    // ------------------------------------------------------------
    // Encontra a linha da planilha com STORE + Tipo + BTU + Ciclo
    // ------------------------------------------------------------
    function findStoreLink() {
      const cicloAlvo = normalizeCiclo(selection.ciclo);
      const row = getStoreRows().find(i =>
        i.Tipo === selection.tipo &&
        i.BTUs === selection.btu &&
        normalizeCiclo(i.Ciclo) === cicloAlvo
      );
      const tag = document.getElementById("sourceTag");
      const input = document.getElementById("urlInput");
      const btn = document.getElementById("renderBtn");
      const box = document.getElementById("search-box");

      if (row && row.Link) {
        input.value = row.Link;
        tag.innerText = `✓ ${row.Site} · ${row.Tipo} · ${formatBTU(row.BTUs)} · ${formatCiclo(row.Ciclo)}`;
        tag.style.color = "var(--green)";
        btn.disabled = false;
        enableLinkActions(row.Link);
        box.classList.add("ready");
        setTimeout(() => box.scrollIntoView({behavior: 'smooth', block: 'center'}), 80);
      } else {
        input.value = "";
        tag.innerText = `⚠ Sem link cadastrado para ${STORE.label} · ${selection.tipo} · ${selection.btu} · ${selection.ciclo}`;
        tag.style.color = "#f59e0b";
        btn.disabled = true;
        disableLinkActions();
      }
    }

    function resetReady() {
      const box = document.getElementById("search-box");
      box.classList.remove("ready");
      document.getElementById("urlInput").value = "";
      document.getElementById("sourceTag").innerText = "Aguardando seleção…";
      document.getElementById("sourceTag").style.color = "var(--accent)";
      document.getElementById("renderBtn").disabled = true;
      disableLinkActions();
    }

    function enableLinkActions(url) {
      const copyBtn = document.getElementById("copyBtn");
      const openBtn = document.getElementById("openBtn");
      copyBtn.disabled = false;
      openBtn.href = url;
      openBtn.removeAttribute("aria-disabled");
    }
    function disableLinkActions() {
      const copyBtn = document.getElementById("copyBtn");
      const openBtn = document.getElementById("openBtn");
      copyBtn.disabled = true;
      openBtn.removeAttribute("href");
      openBtn.setAttribute("aria-disabled", "true");
    }

    // ------------------------------------------------------------
    // Fetch via cascata de proxies
    // ------------------------------------------------------------
    async function tryFetch(targetUrl) {
      try {
        const resp = await fetch(PROXIES[0] + encodeURIComponent(targetUrl));
        if (resp.ok) return await resp.text();
      } catch(e) {}
      try {
        const resp = await fetch(PROXIES[1] + encodeURIComponent(targetUrl));
        const json = await resp.json();
        if (json && json.contents) return json.contents;
      } catch(e) {}
      try {
        const resp = await fetch(PROXIES[2] + encodeURIComponent(targetUrl));
        if (resp.ok) return await resp.text();
      } catch(e) {}
      throw new Error("Falha em todos os proxies.");
    }

    // ------------------------------------------------------------
    // Extração VTEX __STATE__
    // ------------------------------------------------------------
    function extractFromVtexState(html) {
      const stateMatch = html.match(/__STATE__\s*=\s*(\{.*?\});/s) || html.match(/__STATE__\s*=\s*(\{.*?\})<\/script>/s);
      if (!stateMatch) return [];
      let state;
      try { state = JSON.parse(stateMatch[1]); } catch(e) { return []; }

      const productKeys = Object.keys(state).filter(k => k.startsWith("Product:") && state[k].productName);
      return productKeys.map(k => {
        const p = state[k];
        const productId = p.productId;
        const skuKey = Object.keys(state).find(sk => sk.includes(`Product:${productId}`) && sk.includes("items.0"));
        const sku = state[skuKey] || {};
        let img = "";
        if (sku.images?.[0]?.id) img = state[sku.images[0].id]?.imageUrl;
        const sellerKey = Object.keys(state).find(sk => sk.includes(skuKey || productId) && sk.includes("sellers.0"));
        const offer = state[state[sellerKey]?.commertialOffer?.id] || {};
        let cash = "Consulte o site";
        if (offer.SpotPrice || offer.Price) {
          cash = new Intl.NumberFormat("pt-BR", { style: "currency", currency: "BRL" }).format(offer.SpotPrice || offer.Price);
        }
        let parc = "";
        if (offer.Installments?.length > 0) {
          const best = offer.Installments.reduce((a, b) => (a.NumberOfInstallments > b.NumberOfInstallments) ? a : b);
          parc = `ou ${new Intl.NumberFormat("pt-BR", { style: "currency", currency: "BRL" }).format(best.TotalValuePlusInterestRate)} em ${best.NumberOfInstallments}x de ${new Intl.NumberFormat("pt-BR", { style: "currency", currency: "BRL" }).format(best.Value)}`;
        }
        return {
          name: p.productName,
          img,
          cash,
          parc,
          link: STORE.baseUrl + "/" + p.linkText + "/p"
        };
      });
    }

    // ------------------------------------------------------------
    // Fallback DOM
    // ------------------------------------------------------------
    function extractFromDom(html) {
      const products = [];
      const doc = new DOMParser().parseFromString(html, "text/html");
      const items = doc.querySelectorAll('a[class*="vtex-product-summary-2-x-clearLink"]');
      items.forEach(item => {
        const name = item.querySelector('[class*="vtex-product-summary-2-x-productBrand"]')?.innerText;
        const img = item.querySelector('img[class*="vtex-product-summary-2-x-imageNormal"]')?.src || item.querySelector('img[class*="vtex-product-summary-2-x-image"]')?.src;
        const cash = item.querySelector('[class*="vtex-product-price-1-x-spotPriceValue"]')?.innerText;
        const parc = item.querySelector('[class*="vtex-product-price-1-x-installments"]')?.innerText;
        const link = item.href?.startsWith("http") ? item.href : (STORE.baseUrl + (item.getAttribute("href") || ""));
        if (name && cash) products.push({ name, img, cash, parc, link });
      });
      return products;
    }

    // ------------------------------------------------------------
    // Extracao principal via VTEX Catalog API
    // ------------------------------------------------------------
    const API_PROXIES = [
      "https://frigelar-proxy.crftwo.workers.dev/?url=",
      "https://api.codetabs.com/v1/proxy?quest=",
      "https://api.allorigins.win/get?url="
    ];

    function formatCurrency(value) {
      return new Intl.NumberFormat("pt-BR", {
        style: "currency",
        currency: "BRL"
      }).format(value).replace(/\u00a0/g, " ");
    }

    function getOrderParam(parsedUrl) {
      const order = parsedUrl.searchParams.get("order") || parsedUrl.searchParams.get("O") || "";
      const sort = parsedUrl.searchParams.get("sort") || "";
      const value = String(order || sort).toLowerCase();
      if (value.includes("desc")) return "OrderByPriceDESC";
      return "OrderByPriceASC";
    }

    function buildCatalogApiUrls(searchUrl) {
      let parsed;
      try { parsed = new URL(searchUrl); } catch(e) { return []; }

      const pathParts = (value) => String(value || "")
        .replace(/^\/+|\/+$/g, "")
        .split("/")
        .filter(Boolean);

      const queryParts = pathParts(parsed.searchParams.get("query") || parsed.pathname || "/");
      const initialParts = pathParts(parsed.searchParams.get("initialQuery"));
      const mapParts = String(parsed.searchParams.get("map") || "").split(",").filter(Boolean);
      const baseParts = initialParts.length > 0 ? initialParts : queryParts.slice(0, Math.min(2, queryParts.length));
      const extraParts = queryParts.slice(baseParts.length);
      const extraMaps = mapParts.slice(baseParts.length);
      const order = getOrderParam(parsed);

      const groups = [];
      extraParts.forEach((segment, index) => {
        const key = extraMaps[index] || `extra-${index}`;
        let group = groups.find(item => item.key === key);
        if (!group) {
          group = { key, values: [] };
          groups.push(group);
        }
        group.values.push(segment);
      });

      const combinations = groups.length
        ? groups.reduce((acc, group) => acc.flatMap(combo => group.values.map(value => [...combo, value])), [[]])
        : [[]];

      return combinations.map(combo => {
        const finalParts = [...baseParts, ...combo];
        const path = "/" + finalParts.join("/");
        const map = finalParts.map(() => "c").join(",");
        return `${STORE.baseUrl}/api/catalog_system/pub/products/search${path}?map=${map}&O=${order}`;
      });
    }

    function getCycleFilterFromUrl(searchUrl) {
      let parsed;
      try { parsed = new URL(searchUrl); } catch(e) { return ""; }

      const pathParts = (value) => String(value || "")
        .replace(/^\/+|\/+$/g, "")
        .split("/")
        .filter(Boolean);

      const queryParts = pathParts(parsed.searchParams.get("query") || parsed.pathname || "/");
      const initialParts = pathParts(parsed.searchParams.get("initialQuery"));
      const mapParts = String(parsed.searchParams.get("map") || "").split(",").filter(Boolean);
      const baseParts = initialParts.length > 0 ? initialParts : queryParts.slice(0, Math.min(2, queryParts.length));
      const extraParts = queryParts.slice(baseParts.length);
      const extraMaps = mapParts.slice(baseParts.length);

      const cycleIndex = extraMaps.findIndex(map => norm(map).includes("ciclo"));
      if (cycleIndex < 0) return "";

      const cycle = norm(extraParts[cycleIndex]);
      if (cycle.includes("quente")) return "quente";
      if (cycle.includes("frio")) return "frio";
      return "";
    }

    function productMatchesCycleFilter(product, cycleFilter) {
      if (!cycleFilter) return true;

      const haystack = norm([...(product.Ciclo || []), product.productName || ""].join(" "));
      if (cycleFilter === "quente") return haystack.includes("quente");
      if (cycleFilter === "frio") return haystack.includes("frio") && !haystack.includes("quente");
      return true;
    }

    async function fetchApiText(targetUrl) {
      let lastError = null;
      for (const proxy of API_PROXIES) {
        try {
          const resp = await fetch(proxy + encodeURIComponent(targetUrl), { cache: "no-store" });
          if (!resp.ok && resp.status !== 206) throw new Error("HTTP " + resp.status);

          if (proxy.includes("allorigins")) {
            const json = await resp.json();
            if (json && json.contents) return json.contents;
            throw new Error("Resposta sem contents");
          }

          return await resp.text();
        } catch(e) {
          lastError = e;
        }
      }
      throw lastError || new Error("Falha na API VTEX");
    }

    async function fetchCatalogProducts(apiUrl) {
      const products = [];
      for (let from = 0; from < 200; from += 50) {
        const to = from + 49;
        const sep = apiUrl.includes("?") ? "&" : "?";
        const raw = await fetchApiText(`${apiUrl}${sep}_from=${from}&_to=${to}&_=${Date.now()}`);
        let data;
        try { data = JSON.parse(raw); } catch(e) { break; }
        if (!Array.isArray(data) || data.length === 0) break;
        products.push(...data);
        if (data.length < 50) break;
      }
      return products;
    }

    function getProductOffer(product) {
      const items = Array.isArray(product.items) ? product.items : [];
      let fallback = null;
      for (const sku of items) {
        const sellers = Array.isArray(sku.sellers) ? sku.sellers : [];
        const seller = sellers.find(s => s?.commertialOffer?.IsAvailable !== false) || sellers[0];
        const offer = seller?.commertialOffer || {};
        if (!fallback) fallback = { sku, offer, available: false };

        const price = Number(offer.SpotPrice || offer.Price || offer.ListPrice || 0);
        const quantity = Number(offer.AvailableQuantity ?? 1);
        if (price > 0 && offer.IsAvailable !== false && quantity > 0) {
          return { sku, offer, available: true };
        }
      }
      return fallback;
    }

    function getPixPrice(offer) {
      const options = offer?.PaymentOptions?.installmentOptions || [];
      const pixOption = options.find(option => norm(option?.paymentName).includes("pix"));
      const pixInstallment = pixOption?.installments?.find(item => Number(item.count || 0) === 1)
        || pixOption?.installments?.[0];
      const pixCents = Number(pixInstallment?.total || pixInstallment?.value || 0);
      return pixCents > 0 ? pixCents / 100 : 0;
    }

    function formatInstallment(offer) {
      const installments = Array.isArray(offer.Installments) ? offer.Installments : [];
      if (!installments.length) return "";

      const multi = installments.filter(i => Number(i.NumberOfInstallments) > 1);
      const noInterest = multi.filter(i => Number(i.InterestRate || 0) === 0);
      const pool = noInterest.length ? noInterest : multi;
      if (!pool.length) return "";

      const best = pool.reduce((a, b) =>
        Number(a.NumberOfInstallments || 0) > Number(b.NumberOfInstallments || 0) ? a : b
      );
      const count = Number(best.NumberOfInstallments || 0);
      const total = Number(best.TotalValuePlusInterestRate || (Number(best.Value || 0) * count));
      const value = Number(best.Value || (total / count));
      if (!count || !total || !value) return "";

      return `ou ${formatCurrency(total)} em até ${count}x de ${formatCurrency(value)}`;
    }

    function buildProductLink(product, sku) {
      if (product.link) return product.link;
      const slug = product.linkText;
      const itemId = sku?.itemId;
      if (slug && itemId && !slug.endsWith(itemId)) return `${STORE.baseUrl}/${slug}-${itemId}/p`;
      return slug ? `${STORE.baseUrl}/${slug}/p` : STORE.baseUrl;
    }

    function getSortPrice(product) {
      const item = getProductOffer(product);
      const offer = item?.offer || {};
      return Number(getPixPrice(offer) || offer.SpotPrice || offer.Price || offer.ListPrice || Number.MAX_SAFE_INTEGER);
    }

    function sortCatalogProducts(products, searchUrl) {
      let parsed;
      try { parsed = new URL(searchUrl); } catch(e) { return products; }
      const desc = getOrderParam(parsed) === "OrderByPriceDESC";
      return products.sort((a, b) => desc ? getSortPrice(b) - getSortPrice(a) : getSortPrice(a) - getSortPrice(b));
    }

    async function scrapeCatalog(searchUrl) {
      const apiUrls = buildCatalogApiUrls(searchUrl);
      const cycleFilter = getCycleFilterFromUrl(searchUrl);
      const rawProducts = [];
      for (const apiUrl of apiUrls) {
        rawProducts.push(...await fetchCatalogProducts(apiUrl));
      }

      const seen = new Set();
      const uniqueProducts = rawProducts
        .filter(product => product && product.productName)
        .filter(product => {
          const id = product.productId || product.linkText || product.productName;
          if (seen.has(id)) return false;
          seen.add(id);
          return true;
        });

      return sortCatalogProducts(uniqueProducts, searchUrl)
        .map(product => {
          const productOffer = getProductOffer(product);
          if (!productOffer) return null;

          const { sku, offer, available } = productOffer;
          if (!available || !productMatchesCycleFilter(product, cycleFilter)) return null;

          const pixPrice = getPixPrice(offer);
          const basePrice = Number(offer.SpotPrice || offer.Price || offer.ListPrice || 0);
          return {
            name: product.productName,
            img: sku.images?.[0]?.imageUrl || "",
            cash: pixPrice > 0 ? `${formatCurrency(pixPrice)} no Pix` : (basePrice > 0 ? `${formatCurrency(basePrice)} à vista` : "Consulte o site"),
            parc: formatInstallment(offer),
            link: buildProductLink(product, sku)
          };
        })
        .filter(Boolean);
    }

    // ------------------------------------------------------------
    // Main scraper
    // ------------------------------------------------------------
    async function runScraper() {
      const url = document.getElementById("urlInput").value.trim();
      const results = document.getElementById("results");
      const loader = document.getElementById("loader");
      const status = document.getElementById("status");
      const btn = document.getElementById("renderBtn");

      if (!url) return;

      btn.disabled = true;
      loader.style.display = "block";
      results.innerHTML = "";
      status.style.display = "none";

      try {
        let products = await scrapeCatalog(url);
        if (products.length === 0) {
          const html = await tryFetch(url);
          products = extractFromVtexState(html);
          if (products.length === 0) products = extractFromDom(html);
        }

        if (products.length === 0) {
          status.innerText = `Nenhum produto detectado na ${STORE.label}.`;
          status.style.display = "block";
        } else {
          const unique = products.reduce((acc, current) => {
            if (!acc.find(item => item.name === current.name)) acc.push(current);
            return acc;
          }, []);
          unique.forEach(p => {
            const el = document.createElement("div");
            el.className = "card";
            el.innerHTML = `
              <div class="card-img"><img src="${p.img || ""}" onerror="this.src='https://placehold.co/300?text=${encodeURIComponent(STORE.label)}'"></div>
              <div class="card-body">
                <div class="card-title" title="${p.name}">${p.name}</div>
                <div class="price-box">
                  <div class="price-cash">${p.cash}</div>
                  <div class="price-parc">${p.parc || ""}</div>
                </div>
                <a href="${p.link}" target="_blank" class="card-btn">Ver na ${STORE.label}</a>
              </div>`;
            results.appendChild(el);
          });
        }
      } catch(e) {
        console.error(e);
        status.innerText = "Erro crítico ao acessar o site.";
        status.style.display = "block";
      } finally {
        loader.style.display = "none";
        btn.disabled = false;
      }
    }

    document.getElementById("copyBtn").addEventListener("click", async () => {
      const url = document.getElementById("urlInput").value;
      if (!url) return;
      try {
        await navigator.clipboard.writeText(url);
      } catch (e) {
        const inp = document.getElementById("urlInput");
        inp.select(); document.execCommand("copy");
      }
      const b = document.getElementById("copyBtn");
      const original = b.textContent;
      b.textContent = "✓ Copiado!";
      b.classList.add("copied");
      setTimeout(() => { b.textContent = original; b.classList.remove("copied"); }, 1500);
    });

    document.getElementById("renderBtn").addEventListener("click", runScraper);
    loadData();
  </script>
</body>
